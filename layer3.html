<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>暖暖猫咪幸运站 - 第三层</title>
<link rel="stylesheet" href="style.css" />
<style>
.stage{perspective:900px}
.stage-light{position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.45),transparent 46%);pointer-events:none}
.cat{transform-style:preserve-3d;transform:translateX(-50%) rotateX(8deg)}
.head{background:linear-gradient(160deg,#ffe9cc,#ffd7ab 60%,#ffc78f)}
.body{background:linear-gradient(165deg,#ffe8cc,#ffd8b4 62%,#ffc996)}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media (max-width:900px){.summary-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg-cute" id="bgCute"></div>
<main>
  <section class="hero">
    <h1>暖暖猫咪幸运站</h1>
    <p>第三层：生成名字小诗，给猫咪换装，导出暖色海报。</p>
    <div class="steps">
      <button class="step-btn" type="button" onclick="location.href='index.html'">第 1 层 信息</button>
      <button class="step-btn" type="button" onclick="location.href='layer2.html'">第 2 层 幸运签</button>
      <button class="step-btn on" type="button">第 3 层 小诗+换装</button>
    </div>
    <div class="row" style="justify-content:center">
      <button id="musicToggle" class="sec" type="button">播放舒缓音乐</button>
      <input id="musicVolume" type="range" min="0" max="100" value="40" style="width:140px" aria-label="音乐音量" />
    </div>
  </section>

  <section class="grid">
    <article class="card">
      <span class="tag">今日信息</span>
      <div class="summary-grid" style="margin-top:8px">
        <div class="summary"><h3 id="profileName">--</h3><p id="profileText"></p></div>
        <div class="summary"><h3 id="fortuneTitle">--</h3><p id="fortuneText"></p></div>
      </div>
    </article>

    <article class="card layer3">
      <span class="tag">第三层</span>
      <h2>名字小诗 + 小猫咪换装</h2>
      <small>点击猫咪会掉爱心分数，换装会同步到海报里</small>
      <div class="row"><button id="makePoem" class="pri" type="button">生成名字小诗</button><button id="remakePoem" class="sec" type="button">换一首风格</button></div>
      <div class="status" id="poemStatus"></div>
      <div id="poemBox" class="box poem hide"></div>

      <div class="dress">
        <div>
          <div class="stage" id="stage" title="点击猫咪收集爱心">
            <div class="stage-light"></div>
            <div class="shadow"></div>
            <div class="cat">
              <div class="tail"></div>
              <div class="head">
                <div class="ear l"></div><div class="ear r"></div>
                <div class="face">
                  <div class="eyes"><i></i><i></i></div>
                  <div class="cheek l"></div><div class="cheek r"></div>
                  <div class="nose"></div><div class="mouth">ω</div>
                  <div class="whisker l"><span></span><span></span></div>
                  <div class="whisker r"><span></span><span></span></div>
                </div>
              </div>
              <div class="body"><div class="belly">♥</div><div class="paw l"></div><div class="paw r"></div></div>
            </div>
            <div id="slotHead" class="slot"></div>
            <div id="slotFace" class="slot"></div>
            <div id="slotNeck" class="slot"></div>
            <div id="slotHand" class="slot"></div>
            <div id="slotAura" class="slot"></div>
          </div>
          <div class="score">当前爱心分：<b id="score">0</b></div>
          <div class="row"><button id="randomOutfit" class="pri" type="button">随机换装</button><button id="clearOutfit" class="sec" type="button">清空装饰</button></div>
        </div>
        <div id="controls" class="controls"></div>
      </div>
    </article>

    <aside class="card preview">
      <h2>导出海报</h2>
      <small>背景为暖黄油画笔触风，含猫咪、幸运签、小诗</small>
      <div class="summary">
        <h3 id="sumTitle">尚未生成内容</h3>
        <p id="sumProfile">请先生成内容。</p>
        <p id="sumFortune">请先生成内容。</p>
        <p id="sumPoem">请先生成内容。</p>
      </div>
      <div class="row"><button id="makePoster" class="pri" type="button">生成海报</button><a id="download" class="btn sec hide" download="warm-cat-poster.png">下载图片</a></div>
      <img id="previewImg" alt="海报预览" />
      <canvas id="poster" class="hide" width="1080" height="1440"></canvas>
    </aside>
  </section>
</main>

<audio id="bgMusic" preload="auto" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg" />
</audio>

<script src="common.js"></script>
<script>
const FORT_MAP={
  1:{title:"招财招福",text:"贵人相助，心愿易成，今天宜主动出击。",item:"幸运物：红色流苏",time:"幸运时段：09:00-11:00"},
  2:{title:"顺风顺水",text:"沟通顺畅，计划推进快，今天宜处理要事。",item:"幸运物：金色书签",time:"幸运时段：13:00-15:00"},
  3:{title:"有花有酒",text:"情绪柔和，适合庆祝，今天宜见好友。",item:"幸运物：花朵贴纸",time:"幸运时段：18:00-20:00"},
  4:{title:"自得其乐",text:"创意旺盛，灵感涌现，今天宜做新尝试。",item:"幸运物：猫咪挂件",time:"幸运时段：11:00-13:00"},
  5:{title:"见山见海",text:"心境开阔，状态平衡，今天宜学习沉淀。",item:"幸运物：蓝色便签",time:"幸运时段：15:00-17:00"},
  6:{title:"上签上签",text:"整体运势偏强，行动越快收获越多。",item:"幸运物：福字红包",time:"幸运时段：07:30-09:30"}
};

const OUTFIT={
  head:[["none","无",""],["bow","蝴蝶结","🎀"],["crown","小皇冠","👑"],["straw","草帽","👒"],["star","星星夹","⭐"],["flower","花花","🌼"],["party","派对帽","🥳"]],
  face:[["none","无",""],["heart","爱心眼","😍"],["sun","墨镜","🕶️"],["wink","眨眼","😉"],["spark","闪亮眼","✨"],["sleep","困困眼","😴"]],
  neck:[["none","无",""],["bell","铃铛","🔔"],["ribbon","丝带","🎗️"],["scarf","围巾","🧣"],["flower","花环","🌸"],["cookie","曲奇牌","🍪"]],
  hand:[["none","无",""],["fish","小鱼干","🐟"],["milk","奶瓶","🍼"],["toy","玩偶","🧸"],["wand","魔法棒","🪄"],["heart","爱心","💖"],["donut","甜甜圈","🍩"]],
  aura:[["none","无",""],["spark","星光","✨"],["bubble","泡泡","🫧"],["heart","爱心雨","💗"],["moon","小月亮","🌙"],["sun","小太阳","☀️"],["leaf","树叶","🍃"]]
};

const MOOD=["晨光在窗台揉开一团橘色云，","晚风把糖渍星光轻轻吹进衣袖，","奶茶香从街角飘来像一首慢歌，","微暖日光刚好，世界变得软软的，","云朵像棉花一样托住心情，","落日把天边染成琥珀色，"];
const END=["愿你抬头遇见好事，低头捡到温柔。","愿你每一步都踩在好运节拍里。","愿你和喜欢的事都有圆满回应。","愿你的笑意被世界认真收藏。","愿你被温暖包围，也把温暖递出去。","愿今天的幸运，明天继续。"];

const E={
  bgCute:document.getElementById("bgCute"),
  profileName:document.getElementById("profileName"),
  profileText:document.getElementById("profileText"),
  fortuneTitle:document.getElementById("fortuneTitle"),
  fortuneText:document.getElementById("fortuneText"),
  makePoem:document.getElementById("makePoem"),
  remakePoem:document.getElementById("remakePoem"),
  poemStatus:document.getElementById("poemStatus"),
  poemBox:document.getElementById("poemBox"),
  stage:document.getElementById("stage"),
  score:document.getElementById("score"),
  randomOutfit:document.getElementById("randomOutfit"),
  clearOutfit:document.getElementById("clearOutfit"),
  controls:document.getElementById("controls"),
  slotHead:document.getElementById("slotHead"),
  slotFace:document.getElementById("slotFace"),
  slotNeck:document.getElementById("slotNeck"),
  slotHand:document.getElementById("slotHand"),
  slotAura:document.getElementById("slotAura"),
  sumTitle:document.getElementById("sumTitle"),
  sumProfile:document.getElementById("sumProfile"),
  sumFortune:document.getElementById("sumFortune"),
  sumPoem:document.getElementById("sumPoem"),
  makePoster:document.getElementById("makePoster"),
  previewImg:document.getElementById("previewImg"),
  poster:document.getElementById("poster"),
  download:document.getElementById("download"),
  musicToggle:document.getElementById("musicToggle"),
  musicVolume:document.getElementById("musicVolume"),
  bgMusic:document.getElementById("bgMusic")
};

const profile=WarmCat.readJSON(WarmCat.KEYS.profile);
if(!profile){alert("请先完成第一层。\n将跳转到第一页。");location.href="index.html";throw new Error("redirect:index");}
const fortuneSaved=WarmCat.readJSON(WarmCat.KEYS.fortune);
if(!fortuneSaved||fortuneSaved.date!==WarmCat.day()||fortuneSaved.name!==profile.name){
  alert("请先完成第二层抽签。\n将跳转到第二层。");
  location.href="layer2.html";
  throw new Error("redirect:layer2");
}
const fortune=FORT_MAP[fortuneSaved.id]||FORT_MAP[1];

const state={
  poem:"",
  outfit:WarmCat.readJSON(WarmCat.KEYS.outfit)||{head:"none",face:"none",neck:"none",hand:"none",aura:"none"},
  score:Number(WarmCat.readJSON(WarmCat.KEYS.score)||0)
};

E.profileName.textContent=`${profile.name} 的今日档案`;
E.profileText.textContent=WarmCat.profileText(profile);
E.fortuneTitle.textContent=`幸运签：${fortune.title}`;
E.fortuneText.textContent=fortune.text;
E.score.textContent=String(state.score);

function outfitEmoji(cat,id){
  const item=OUTFIT[cat].find(x=>x[0]===id);
  return item?item[2]:"";
}

function applyOutfit(){
  E.slotHead.textContent=outfitEmoji("head",state.outfit.head);
  E.slotFace.textContent=outfitEmoji("face",state.outfit.face);
  E.slotNeck.textContent=outfitEmoji("neck",state.outfit.neck);
  E.slotHand.textContent=outfitEmoji("hand",state.outfit.hand);
  E.slotAura.textContent=outfitEmoji("aura",state.outfit.aura);
  document.querySelectorAll(".opt").forEach(btn=>btn.classList.toggle("on",state.outfit[btn.dataset.cat]===btn.dataset.id));
  WarmCat.writeJSON(WarmCat.KEYS.outfit,state.outfit);
}

function buildControls(){
  const labels={head:"头饰",face:"表情",neck:"颈饰",hand:"手持",aura:"氛围"};
  Object.keys(OUTFIT).forEach(cat=>{
    const g=document.createElement("div");g.className="grp";
    const h=document.createElement("h3");h.textContent=labels[cat];g.appendChild(h);
    const w=document.createElement("div");w.className="opts";
    OUTFIT[cat].forEach(([id,label,icon])=>{
      const b=document.createElement("button");
      b.className="opt";b.type="button";b.dataset.cat=cat;b.dataset.id=id;
      b.textContent=`${icon?icon+" ":""}${label}`;
      b.onclick=()=>{state.outfit[cat]=id;applyOutfit();};
      w.appendChild(b);
    });
    g.appendChild(w);
    E.controls.appendChild(g);
  });
  applyOutfit();
}

function randomOutfit(){
  Object.keys(OUTFIT).forEach(cat=>{
    const arr=OUTFIT[cat];
    state.outfit[cat]=arr[Math.floor(Math.random()*arr.length)][0];
  });
  applyOutfit();
}
function clearOutfit(){
  state.outfit={head:"none",face:"none",neck:"none",hand:"none",aura:"none"};
  applyOutfit();
}

function makePoemText(salt=0){
  const chars=Array.from(profile.name||"");
  const c1=chars[0]||"你";
  const c2=chars[1]||c1||"呀";
  const mood=MOOD[WarmCat.hash(`${profile.name}-${fortune.title}-${WarmCat.day()}-${salt}`)%MOOD.length];
  const end=END[WarmCat.hash(`${fortune.title}-${profile.name}-${salt}`)%END.length];
  return [mood,`${c1}字写在风里，像一颗软糖慢慢发光，`,`${c2}字落在心上，和「${fortune.title}」并肩同行，`,`愿${profile.name}今天被温柔拥抱，${end}`].join("\n");
}

function makePoem(salt=0){
  state.poem=makePoemText(salt);
  E.poemBox.textContent=state.poem;
  E.poemBox.classList.remove("hide");
  WarmCat.writeJSON(WarmCat.KEYS.poem,{date:WarmCat.day(),name:profile.name,poem:state.poem,salt});
  WarmCat.status(E.poemStatus,"名字小诗已生成。");
  updateSummary();
}

function loadPoem(){
  const p=WarmCat.readJSON(WarmCat.KEYS.poem);
  if(!p||p.date!==WarmCat.day()||p.name!==profile.name)return;
  state.poem=p.poem;
  E.poemBox.textContent=p.poem;
  E.poemBox.classList.remove("hide");
  WarmCat.status(E.poemStatus,"已读取今日小诗。");
}

function popHeart(ev){
  state.score+=1;
  E.score.textContent=String(state.score);
  WarmCat.writeJSON(WarmCat.KEYS.score,state.score);
  const rect=E.stage.getBoundingClientRect();
  const x=ev.clientX-rect.left;
  const y=ev.clientY-rect.top;
  const s=document.createElement("span");
  s.className="float";
  s.textContent=["💖","💗","💞","💘"][Math.floor(Math.random()*4)];
  s.style.left=`${x}px`;s.style.top=`${y}px`;s.style.fontSize=`${18+Math.random()*16}px`;
  E.stage.appendChild(s);
  setTimeout(()=>s.remove(),1000);
}

function updateSummary(){
  E.sumTitle.textContent=`${profile.name} 的今日暖暖海报`;
  E.sumProfile.textContent=WarmCat.profileText(profile);
  E.sumFortune.textContent=`幸运签：${fortune.title}。${fortune.text}`;
  E.sumPoem.textContent=state.poem?`小诗：${state.poem.replace(/\n/g," ")}`:"请先生成名字小诗。";
}

function rr(ctx,x,y,w,h,r){const k=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+k,y);ctx.lineTo(x+w-k,y);ctx.quadraticCurveTo(x+w,y,x+w,y+k);ctx.lineTo(x+w,y+h-k);ctx.quadraticCurveTo(x+w,y+h,x+w-k,y+h);ctx.lineTo(x+k,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-k);ctx.lineTo(x,y+k);ctx.quadraticCurveTo(x,y,x+k,y);ctx.closePath();}
function wrap(ctx,t,m){const c=Array.from(t),o=[];let l="";c.forEach(ch=>{const n=l+ch;if(ctx.measureText(n).width>m&&l){o.push(l);l=ch;}else l=n;});if(l)o.push(l);return o;}

function drawPosterBg(ctx,w,h){
  ctx.fillStyle="#fff8ea";
  ctx.fillRect(0,0,w,h);
  const colors=["rgba(253,226,92,.55)","rgba(252,212,73,.52)","rgba(250,167,124,.35)","rgba(185,209,231,.28)","rgba(224,196,229,.23)","rgba(255,236,132,.47)"];
  for(let i=0;i<44;i+=1){
    ctx.strokeStyle=colors[Math.floor(Math.random()*colors.length)];
    ctx.lineWidth=34+Math.random()*90;
    ctx.lineCap="round";
    const x1=-140+Math.random()*(w*0.8);
    const y1=-60+Math.random()*(h*0.9);
    const x2=x1+260+Math.random()*520;
    const y2=y1-180+Math.random()*320;
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();
  }
  ctx.fillStyle="rgba(192,142,96,.08)";
  for(let i=0;i<48;i+=1){
    const px=Math.random()*w,py=Math.random()*h,s=7+Math.random()*8;
    ctx.beginPath();ctx.arc(px-s*1.2,py-s*1.3,s*.45,0,Math.PI*2);ctx.arc(px+s*1.2,py-s*1.3,s*.45,0,Math.PI*2);ctx.arc(px,py,s*.62,0,Math.PI*2);ctx.fill();
  }
}

function drawCat(ctx,x,y){
  ctx.save();ctx.fillStyle="rgba(70,45,20,.16)";ctx.beginPath();ctx.ellipse(x,y+236,132,26,0,0,Math.PI*2);ctx.fill();
  const headGrad=ctx.createLinearGradient(x-80,y-10,x+80,y+120);headGrad.addColorStop(0,"#ffe9cc");headGrad.addColorStop(.65,"#ffd6a8");headGrad.addColorStop(1,"#ffc28f");
  const bodyGrad=ctx.createLinearGradient(x-70,y+80,x+70,y+240);bodyGrad.addColorStop(0,"#ffe7c8");bodyGrad.addColorStop(.7,"#ffd4ab");bodyGrad.addColorStop(1,"#ffbf8b");
  ctx.fillStyle=headGrad;ctx.strokeStyle="#6f4225";ctx.lineWidth=5;
  const ear=(ox,flip)=>{ctx.save();ctx.translate(x+ox,y-44);if(flip)ctx.scale(-1,1);ctx.beginPath();ctx.moveTo(-24,28);ctx.quadraticCurveTo(-22,-26,22,18);ctx.quadraticCurveTo(8,34,-24,28);ctx.fill();ctx.stroke();ctx.fillStyle="#ffcfa8";ctx.beginPath();ctx.moveTo(-9,22);ctx.quadraticCurveTo(-7,-3,11,17);ctx.quadraticCurveTo(4,25,-9,22);ctx.fill();ctx.restore();ctx.fillStyle=headGrad;};
  ear(-60,false);ear(60,true);
  ctx.beginPath();ctx.ellipse(x,y+118,86,80,0,0,Math.PI*2);ctx.fillStyle=bodyGrad;ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.ellipse(x,y+34,98,82,0,0,Math.PI*2);ctx.fillStyle=headGrad;ctx.fill();ctx.stroke();
  ctx.fillStyle="#ffdfbe";rr(ctx,x-56,y+183,42,30,16);ctx.fill();ctx.stroke();rr(ctx,x+14,y+183,42,30,16);ctx.fill();ctx.stroke();
  ctx.strokeStyle="#6f4225";ctx.lineWidth=6;ctx.beginPath();ctx.arc(x+96,y+126,48,-1.1,.15);ctx.stroke();
  ctx.fillStyle="#2f1e14";ctx.beginPath();ctx.ellipse(x-24,y+18,7,10,0,0,Math.PI*2);ctx.ellipse(x+24,y+18,7,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#fff";ctx.beginPath();ctx.ellipse(x-22,y+15,2.3,3,0,0,Math.PI*2);ctx.ellipse(x+26,y+15,2.3,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="rgba(241,138,140,.55)";ctx.beginPath();ctx.ellipse(x-38,y+46,14,8,0,0,Math.PI*2);ctx.ellipse(x+38,y+46,14,8,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#8a4e2c";ctx.beginPath();ctx.ellipse(x,y+36,9,7,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#8a5738";ctx.lineWidth=2.3;ctx.beginPath();ctx.moveTo(x-60,y+36);ctx.lineTo(x-34,y+39);ctx.moveTo(x-60,y+47);ctx.lineTo(x-34,y+45);ctx.moveTo(x+60,y+36);ctx.lineTo(x+34,y+39);ctx.moveTo(x+60,y+47);ctx.lineTo(x+34,y+45);ctx.stroke();
  ctx.fillStyle="#6f4225";ctx.font="28px 'Microsoft YaHei'";ctx.textAlign="center";ctx.fillText("ω",x,y+62);
  ctx.fillStyle="#e78692";ctx.font="bold 30px 'Microsoft YaHei'";ctx.fillText("♥",x,y+158);
  ctx.font="56px 'Segoe UI Emoji','Apple Color Emoji',sans-serif";
  const h=outfitEmoji("head",state.outfit.head),f=outfitEmoji("face",state.outfit.face),n=outfitEmoji("neck",state.outfit.neck),d=outfitEmoji("hand",state.outfit.hand),a=outfitEmoji("aura",state.outfit.aura);
  if(h)ctx.fillText(h,x,y-22);if(f)ctx.fillText(f,x,y+48);if(n)ctx.fillText(n,x,y+140);if(d)ctx.fillText(d,x+90,y+172);if(a)ctx.fillText(a,x+120,y-28);
  ctx.restore();
}

function makePoster(){
  if(!state.poem){WarmCat.status(E.poemStatus,"请先生成名字小诗。",true);return;}
  const c=E.poster,ctx=c.getContext("2d");
  drawPosterBg(ctx,c.width,c.height);
  rr(ctx,58,54,964,1330,42);ctx.fillStyle="rgba(255,248,239,.9)";ctx.fill();ctx.strokeStyle="rgba(214,132,62,.35)";ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle="#af4f24";ctx.font="bold 62px 'KaiTi','Microsoft YaHei',sans-serif";ctx.textAlign="left";ctx.fillText("暖暖猫咪幸运纪念图",110,140);
  ctx.fillStyle="#945932";ctx.font="30px 'Microsoft YaHei'";ctx.fillText(`日期：${WarmCat.day()}`,110,190);

  rr(ctx,100,224,880,200,26);ctx.fillStyle="#fff4e4";ctx.fill();ctx.strokeStyle="#f0c08f";ctx.stroke();
  ctx.fillStyle="#934f2a";ctx.font="36px 'Microsoft YaHei'";ctx.fillText(`名字：${profile.name}`,130,282);ctx.fillText(`年龄：${profile.age} 岁`,130,336);
  const ex=[];if(profile.city)ex.push(`城市 ${profile.city}`);if(profile.hobby)ex.push(`喜欢 ${profile.hobby}`);if(profile.wish)ex.push(`愿望 ${profile.wish}`);
  if(ex.length){ctx.font="26px 'Microsoft YaHei'";let y=384;wrap(ctx,ex.join(" | "),820).slice(0,2).forEach(line=>{ctx.fillText(line,130,y);y+=34;});}

  rr(ctx,100,450,540,270,26);ctx.fillStyle="#fff1de";ctx.fill();ctx.strokeStyle="#efbf90";ctx.stroke();
  ctx.fillStyle="#a64f22";ctx.font="bold 40px 'KaiTi','Microsoft YaHei'";ctx.fillText(`幸运签：${fortune.title}`,126,508);
  ctx.font="28px 'Microsoft YaHei'";ctx.fillStyle="#844a29";let fy=556;wrap(ctx,fortune.text,490).slice(0,4).forEach(line=>{ctx.fillText(line,126,fy);fy+=38;});
  ctx.fillStyle="#975733";ctx.font="25px 'Microsoft YaHei'";ctx.fillText(fortune.item,126,676);ctx.fillText(fortune.time,126,710);

  rr(ctx,100,748,880,300,26);ctx.fillStyle="#fff6eb";ctx.fill();ctx.strokeStyle="#efbf90";ctx.stroke();ctx.fillStyle="#a64f22";ctx.font="bold 40px 'KaiTi','Microsoft YaHei'";ctx.fillText("名字小诗",126,810);
  ctx.fillStyle="#874a2a";ctx.font="30px 'KaiTi','Microsoft YaHei'";let py=862;state.poem.split("\n").forEach(line=>{wrap(ctx,line,828).forEach(v=>{ctx.fillText(v,126,py);py+=44;});});

  rr(ctx,660,450,320,270,26);ctx.fillStyle="#fff2e2";ctx.fill();ctx.strokeStyle="#efbf90";ctx.stroke();drawCat(ctx,816,500);
  ctx.fillStyle="#9b5f39";ctx.font="24px 'Microsoft YaHei'";ctx.fillText(`爱心小游戏得分：${state.score}`,674,704);
  ctx.fillStyle="#9f6a48";ctx.fillText("来自暖暖猫咪幸运站",110,1328);

  const url=c.toDataURL("image/png");
  E.previewImg.src=url;E.previewImg.style.display="block";E.download.href=url;E.download.classList.remove("hide");
}
