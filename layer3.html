<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>暖暖猫咪幸运站 - 第三层</title>
<link rel="stylesheet" href="style.css" />
<style>
:root{
  --warm-bg-top:#FAF7F2;
  --warm-bg-bottom:#F9EED8;
  --warm-main-a:#F4A868;
  --warm-main-b:#F2995E;
  --warm-ink:#8B7355;
  --warm-line:#D9C5B0;
  --warm-card:#FFFBF5;
  --pad-pink:#FFD6E0;
  --grass-soft:#D6E9C6;
  --sky-soft:#D9E9F7;
}

.layer3-page{
  background:
    radial-gradient(circle at 18px 14px,rgba(139,115,85,.06) 0 4px,transparent 4px),
    radial-gradient(circle at 33px 14px,rgba(139,115,85,.06) 0 4px,transparent 4px),
    radial-gradient(circle at 25px 25px,rgba(139,115,85,.07) 0 6px,transparent 6px),
    radial-gradient(circle at 18px 36px,rgba(139,115,85,.06) 0 4px,transparent 4px),
    radial-gradient(circle at 33px 36px,rgba(139,115,85,.06) 0 4px,transparent 4px),
    radial-gradient(circle at 25px 46px,rgba(139,115,85,.07) 0 8px,transparent 8px),
    linear-gradient(180deg,var(--warm-bg-top),var(--warm-bg-bottom));
  background-size:118px 118px,118px 118px,118px 118px,118px 118px,118px 118px,118px 118px,auto;
  color:var(--warm-ink);
}

.layer3-page h1{
  font-family:"STKaiti","KaiTi","YouYuan","Comic Sans MS",cursive;
  color:#8B6549;
  text-shadow:1px 1px 0 #EAD9C6;
}

.layer3-page .hero p{font-size:1.06rem;line-height:1.88;color:#8B7355}
.layer3-page .steps{gap:10px;margin-top:16px}
.layer3-page .step-btn{min-height:44px;padding:10px 18px;border-radius:999px;border-color:#D9C5B0;background:#FFF9F1;color:#8B7355}
.layer3-page .step-btn.on{background:linear-gradient(180deg,#F4A868,#F2995E);border-color:#F2995E;color:#fff;box-shadow:0 10px 16px rgba(242,153,94,.28)}
.layer3-page .step-btn.done{background:linear-gradient(180deg,#F5BC81,#F2A96C);border-color:#EFA164;color:#804724}
.layer3-page .step-track{height:12px;border-color:#D9C5B0;background:#FFF9F1}
.layer3-page .step-fill{background:radial-gradient(circle at 8px 6px,rgba(255,255,255,.34) 0 2.5px,transparent 2.5px),linear-gradient(90deg,#F4A868,#F2995E);background-size:20px 12px,auto}

.layer3-page .card{
  border-radius:20px;
  border:1px solid rgba(217,197,176,.82);
  box-shadow:0 10px 24px rgba(205,171,138,.22);
  background:rgba(255,252,247,.94);
  padding:18px;
  transition:transform .25s ease,box-shadow .25s ease;
}
.layer3-page .card:hover{transform:translateY(-2px);box-shadow:0 14px 26px rgba(205,171,138,.28)}

.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.summary-grid .summary{background:#fff7ef;border:1px solid #ecd1b9;border-radius:14px;padding:10px}

.music-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center}
#musicToggle{position:relative;border-radius:20px;padding:10px 18px 10px 20px;border:1px solid var(--warm-line);background:linear-gradient(180deg,#FFF4E8,#FFE8D6);color:#8B7355}
#musicToggle:before{content:"🐾 "}
#musicVolume{accent-color:var(--warm-main-a)}

.dress-upgraded{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}
.model-panel,.wardrobe-panel{background:rgba(255,250,242,.92);border:1px solid #ead2bb;border-radius:16px;padding:12px;box-shadow:0 8px 18px rgba(210,170,130,.14)}

.base-switch{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.base-switch button{
  border:1px solid #e7c8ad;
  border-radius:999px;
  background:#fff8ef;
  color:#8b5f3f;
  padding:6px 12px;
  font-weight:700;
}
.base-switch button.on{background:linear-gradient(180deg,var(--warm-main-a),var(--warm-main-b));color:#fff;border-color:#ec9f63}

.plush-stage{
  --cat-main-light:#fcd391;
  --cat-main-mid:#f9c870;
  --cat-main-dark:#e2ab61;
  --cat-fur-edge:#b68758;
  --cat-belly:#fff8ef;
  --cat-ear-inner:#FFD6E0;
  --cat-eye:#5f3a28;
  --cat-tail-anim:tailSwing 3s ease-in-out infinite;
  --cat-ear-anim:none;
  --cat-tail-tip-anim:none;

  position:relative;
  min-height:390px;
  border:1px solid #efc79e;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  background:
    radial-gradient(circle at 22% 14%,rgba(255,255,255,.52),transparent 42%),
    radial-gradient(circle at 78% 80%,rgba(255,214,224,.14),transparent 45%),
    linear-gradient(160deg,#fff9f0,#ffedd8);
}

.plush-stage:before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 12px 10px,rgba(217,197,176,.10) 0 2px,transparent 2px),
    radial-gradient(circle at 21px 10px,rgba(217,197,176,.10) 0 2px,transparent 2px),
    radial-gradient(circle at 16px 16px,rgba(217,197,176,.12) 0 3px,transparent 3px);
  background-size:120px 120px;
}

.stage-light{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 30% 16%,rgba(255,255,255,.38),transparent 46%)}

.cat-svg{
  width:min(100%,440px);
  height:auto;
  display:block;
  margin:8px auto 0;
  transform-origin:center 74%;
  animation:catBreathe 3s ease-in-out infinite;
}

.cat-svg #svgBodyCore{animation:bellyRise 3s ease-in-out infinite}
.cat-svg #svgTailMain{transform-origin:292px 286px;animation:var(--cat-tail-anim)}
.cat-svg #svgTailTip{transform-origin:335px 266px;animation:var(--cat-tail-tip-anim)}
.cat-svg #svgEarL,.cat-svg #svgEarR{transform-origin:210px 132px;animation:var(--cat-ear-anim)}

.plush-stage.cat-a{
  --cat-main-light:#fcd391;
  --cat-main-mid:#f9c870;
  --cat-main-dark:#e2ab61;
  --cat-fur-edge:#b68758;
  --cat-tail-anim:tailSwing 3s ease-in-out infinite;
}
.plush-stage.cat-b{
  --cat-main-light:#f8f8f8;
  --cat-main-mid:#f0f0f0;
  --cat-main-dark:#dbdbdb;
  --cat-fur-edge:#a9a9a9;
  --cat-tail-anim:tailCurve 3.4s ease-in-out infinite;
  --cat-ear-anim:earDrop 4.2s ease-in-out infinite;
}
.plush-stage.cat-c{
  --cat-main-light:#d8d8d8;
  --cat-main-mid:#cfcfcf;
  --cat-main-dark:#bcbcbc;
  --cat-fur-edge:#8d8d8d;
  --cat-tail-anim:tailCozy 3.6s ease-in-out infinite;
  --cat-tail-tip-anim:tailTipJitter 2.8s ease-in-out infinite;
}

.eye-round{display:none}
.eye-crescent{display:none}
.eye-half{display:none}
.star-glint{display:none}

.plush-stage.cat-a .eye-round{display:block}
.plush-stage.cat-a .star-glint{display:block}
.plush-stage.cat-b .eye-crescent{display:block}
.plush-stage.cat-c .eye-half{display:block}

.cat-svg.blink .eye-round,
.cat-svg.blink .eye-crescent,
.cat-svg.blink .eye-half{opacity:0}

.cat-svg.clicking{animation:headNod .32s cubic-bezier(.2,.82,.32,1.15)}
.cat-svg.wear-pop{animation:wearBounce .36s ease}
.cat-svg.full-spin{animation:happySpin .5s ease}
.cat-svg.yawn{animation:yawnTilt .45s ease}

.cat-bubble{
  position:absolute;
  left:50%;
  top:8px;
  transform:translateX(-50%);
  background:rgba(255,251,242,.96);
  border:1px solid #f0c8a4;
  border-radius:999px;
  color:#8f542f;
  padding:4px 11px;
  font-size:.84rem;
  box-shadow:0 8px 16px rgba(170,101,50,.18);
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease;
}
.cat-bubble.on{opacity:1}

.score{margin-top:8px;font-size:.94rem;color:#a15f37}
.score b{color:#b84f22;display:inline-block}
.score b.bump{animation:scorePop .28s ease}

.action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.action-row button{border-radius:16px;min-height:42px;padding:10px 14px}
#randomOutfit:before{content:"✨ ";}
#clearOutfit:before{content:"🗑️ ";}

.category-tabs{display:flex;gap:16px;overflow:auto;padding-bottom:4px;scrollbar-width:thin;scrollbar-color:#f4a868 #fff2e6}
.category-tab{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid #d9c5b0;
  border-radius:12px;
  background:#fff9f1;
  color:#8b684a;
  padding:8px 12px;
  font-weight:700;
  flex:0 0 auto;
}
.category-tab.on{
  background:linear-gradient(180deg,#F4A868,#F2995E);
  color:#fff;
  border-color:#ec9f63;
  box-shadow:inset 0 0 0 1px rgba(255,246,235,.7);
}

.option-shell{
  margin-top:10px;
  border-radius:16px;
  border:1px solid #ecd2ba;
  background:#fffdf8;
  box-shadow:0 6px 14px rgba(210,170,130,.12);
  padding:12px 16px;
  max-height:352px;
  overflow:auto;
  scrollbar-width:thin;
  scrollbar-color:#f4a868 #fff2e6;
}
.option-shell::-webkit-scrollbar{width:10px}
.option-shell::-webkit-scrollbar-track{background:#fff2e6;border-radius:999px}
.option-shell::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#f4a868,#f2995e);border-radius:999px}

.options-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.opt-btn{
  position:relative;
  border:1px solid #ecd2ba;
  border-radius:8px;
  background:#fff;
  padding:8px 6px;
  color:#865b39;
  box-shadow:0 4px 8px rgba(210,170,130,.12);
  transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease,background .2s ease;
  min-height:72px;
}
.opt-btn.none{background:#f6f2ee;color:#9f8d7a}
.opt-btn:hover{transform:scale(1.05);box-shadow:0 0 0 1px rgba(244,168,104,.35),0 8px 12px rgba(210,170,130,.2)}
.opt-btn.on{
  transform:scale(1.02);
  border:2px solid #f4a868;
  background:rgba(255,214,224,.3);
}
.opt-btn.on:after{content:"✅";position:absolute;right:4px;top:2px;font-size:.78rem}
.opt-thumb{display:block;font-size:1.34rem;line-height:1.2;filter:drop-shadow(0 2px 2px rgba(205,164,124,.25))}
.opt-name{display:block;margin-top:4px;font-size:.78rem;line-height:1.25}

.fly-ornament{position:fixed;pointer-events:none;z-index:28;font-size:26px;animation:ornFly .35s ease-out forwards}
.float-heart{position:absolute;pointer-events:none;animation:heartUp 1s ease forwards}

.poem-style{margin-top:6px;font-size:.9rem;color:#975a34}
.poster-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.poster-badge{margin-top:8px;padding:6px 10px;border-radius:999px;background:#fff4e5;border:1px solid #efc7a2;color:#9f5f35;font-size:.85rem;display:inline-block}
.bless-box{margin-top:8px;padding:8px 10px;border-radius:10px;background:linear-gradient(130deg,#fff5eb,#ffe8d1);border:1px dashed #efbd95;color:#8f552f;font-size:.9rem}

.poster-panel{position:relative}
.poster-mode{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.poster-mode button{border-radius:999px;padding:7px 12px;border:1px solid #e7c8ad;background:#fff9f1;color:#8b5f3f;font-weight:700}
.poster-mode button.on{background:linear-gradient(180deg,#F4A868,#F2995E);border-color:#ec9f63;color:#fff}

.poster-layout-note{font-size:.84rem;color:#97633e;margin-top:6px}
.poster-save-pop{animation:posterSavePop .5s ease}

#previewImg{width:100%;border-radius:14px;border:1px solid #ecd1b8;background:#fffdf8;display:none;margin-top:8px}

@keyframes catBreathe{0%,100%{transform:scale(.98)}50%{transform:scale(1.02)}}
@keyframes bellyRise{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
@keyframes tailSwing{0%,100%{transform:rotate(0)}50%{transform:rotate(5deg)}}
@keyframes tailCurve{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes tailCozy{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes tailTipJitter{0%,100%{transform:rotate(0)}50%{transform:rotate(2deg)}}
@keyframes earDrop{0%,100%{transform:rotate(0)}50%{transform:rotate(3deg)}}
@keyframes headNod{0%{transform:scale(1)}35%{transform:scale(1.02) translateY(-2px) rotate(-3deg)}100%{transform:scale(1)}}
@keyframes wearBounce{0%{transform:scale(.99)}50%{transform:scale(1.01) translateY(3px)}100%{transform:scale(1)}}
@keyframes happySpin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes yawnTilt{0%{transform:rotate(0)}40%{transform:rotate(-6deg)}100%{transform:rotate(0)}}
@keyframes scorePop{0%{transform:scale(1)}50%{transform:scale(1.22)}100%{transform:scale(1)}}
@keyframes heartUp{0%{opacity:.95;transform:translate(-50%,-40%) scale(1)}100%{opacity:0;transform:translate(-50%,-170%) scale(1.2)}}
@keyframes ornFly{0%{opacity:.95;transform:translate(-50%,-50%) scale(.8)}100%{opacity:0;transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(1.05)}}
@keyframes posterSavePop{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}

@media (max-width:1080px){
  .layer3,.preview{grid-column:span 12}
  .dress-upgraded{grid-template-columns:1fr}
}

@media (max-width:760px){
  .options-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .opt-btn{min-height:78px}
  .category-tab{font-size:1rem}
  .poem-style,.poster-layout-note,.score{font-size:1rem}
  #poemBox{font-size:1.06rem;line-height:2}
  .summary p,.summary small,.summary-grid p{font-size:1.02rem}
  .plush-stage{min-height:340px}
  .poster-actions{grid-template-columns:1fr}
}

@media (prefers-reduced-motion:reduce){
  .cat-svg,.cat-svg *,.float-heart,.fly-ornament,.poster-save-pop{animation:none !important;transition:none !important}
}
</style>
</head>
<body class="layer3-page">
<div class="bg-cute" id="bgCute"></div>
<main>
  <section class="hero">
    <h1>暖暖猫咪幸运站</h1>
    <p id="heroSub">第三层：生成名字小诗，给猫咪换装，导出暖色海报。🐱</p>
    <div class="steps">
      <button class="step-btn done" type="button" onclick="location.href='layer1.html'" aria-label="返回第一层">第 1 层 信息</button>
      <button class="step-btn done" type="button" onclick="location.href='layer2.html'" aria-label="返回第二层">第 2 层 幸运签</button>
      <button class="step-btn on" type="button" aria-label="当前在第三层">第 3 层 小诗+换装</button>
    </div>
    <div class="step-track" aria-hidden="true"><span class="step-fill p3"></span></div>
    <div class="row" style="justify-content:center">
      <button id="musicToggle" class="sec" type="button" aria-label="播放或暂停舒缓音乐">播放舒缓音乐</button>
      <input id="musicVolume" type="range" min="0" max="100" value="40" style="width:140px" aria-label="音乐音量" />
    </div>
  </section>

  <section class="grid">
    <article class="card">
      <span class="tag">今日信息</span>
      <div class="summary-grid" style="margin-top:8px">
        <div class="summary"><h3 id="profileName">--</h3><p id="profileText"></p></div>
        <div class="summary"><h3 id="fortuneTitle">--</h3><p id="fortuneText"></p></div>
      </div>
    </article>

    <article class="card layer3">
      <span class="tag">第三层</span>
      <h2>名字小诗 + 2.5D毛绒猫咪换装</h2>
      <small>默认跟随你在第一层最常点击的猫咪。点击猫咪会互动，换装有飞入反馈与爱心加分。</small>
      <div class="row">
        <button id="makePoem" class="pri" type="button" aria-label="生成名字小诗">生成名字小诗</button>
        <button id="remakePoem" class="sec" type="button" aria-label="换一首风格">换一首风格</button>
      </div>
      <div class="poem-style" id="poemStyleText"></div>
      <div class="status" id="poemStatus" aria-live="polite"></div>
      <div id="poemBox" class="box poem hide"></div>

      <div class="dress dress-upgraded">
        <section class="model-panel">
          <div id="baseSwitch" class="base-switch" aria-label="基础猫咪选择"></div>
          <div class="stage plush-stage" id="stage" title="点击猫咪收集爱心" aria-label="猫咪互动区域">
            <div class="stage-light" aria-hidden="true"></div>
            <svg id="catSvg" class="cat-svg" viewBox="0 0 420 420" role="img" aria-label="Q版毛绒小猫模型">
              <defs>
                <radialGradient id="furGrad" cx="50%" cy="38%" r="66%">
                  <stop offset="0%" stop-color="var(--cat-main-light)" />
                  <stop offset="68%" stop-color="var(--cat-main-mid)" />
                  <stop offset="100%" stop-color="var(--cat-main-dark)" />
                </radialGradient>
                <radialGradient id="bellyGrad" cx="50%" cy="35%" r="72%">
                  <stop offset="0%" stop-color="#ffffff" />
                  <stop offset="100%" stop-color="var(--cat-belly)" />
                </radialGradient>
                <radialGradient id="blushGrad" cx="50%" cy="50%" r="70%">
                  <stop offset="0%" stop-color="rgba(255,214,224,.65)" />
                  <stop offset="100%" stop-color="rgba(255,214,224,0)" />
                </radialGradient>
                <filter id="furSoft" x="-10%" y="-10%" width="120%" height="120%">
                  <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" seed="7" result="noise" />
                  <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4" xChannelSelector="R" yChannelSelector="G" />
                  <feGaussianBlur stdDeviation="0.25" />
                </filter>
                <filter id="furEdge" x="-12%" y="-12%" width="124%" height="124%">
                  <feGaussianBlur stdDeviation="0.7" />
                </filter>
              </defs>

              <g id="svg-tail">
                <path id="svgTailMain" d="M286 284 C342 250 366 302 344 334 C322 366 280 350 274 322" fill="url(#furGrad)" stroke="rgba(0,0,0,.12)" stroke-width="2.2" filter="url(#furSoft)" />
                <path id="svgTailTip" d="M330 308 C342 310 350 316 352 326" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="2" stroke-linecap="round" />
              </g>

              <g id="svg-base-body">
                <ellipse cx="210" cy="360" rx="112" ry="18" fill="rgba(125,95,70,.18)" />
                <ellipse id="svgBodyCore" cx="210" cy="280" rx="96" ry="90" fill="url(#furGrad)" stroke="rgba(0,0,0,.12)" stroke-width="2" filter="url(#furSoft)" />
                <path d="M165 245 C182 214 238 214 255 245 C266 266 263 290 245 305 C225 321 195 321 175 305 C157 290 154 266 165 245 Z" fill="url(#bellyGrad)" opacity=".96" filter="url(#furSoft)" />
              </g>

              <g id="svg-paws">
                <ellipse cx="154" cy="340" rx="32" ry="30" fill="url(#bellyGrad)" stroke="rgba(0,0,0,.10)" stroke-width="1.6" />
                <ellipse cx="266" cy="340" rx="32" ry="30" fill="url(#bellyGrad)" stroke="rgba(0,0,0,.10)" stroke-width="1.6" />
                <ellipse cx="154" cy="345" rx="14" ry="18" fill="rgba(255,214,224,.92)" />
                <ellipse cx="266" cy="345" rx="14" ry="18" fill="rgba(255,214,224,.92)" />
                <circle cx="142" cy="333" r="4.6" fill="rgba(255,214,224,.92)" />
                <circle cx="149" cy="328" r="4.4" fill="rgba(255,214,224,.92)" />
                <circle cx="159" cy="327" r="4.4" fill="rgba(255,214,224,.92)" />
                <circle cx="167" cy="332" r="4.5" fill="rgba(255,214,224,.92)" />
                <circle cx="254" cy="333" r="4.6" fill="rgba(255,214,224,.92)" />
                <circle cx="261" cy="328" r="4.4" fill="rgba(255,214,224,.92)" />
                <circle cx="271" cy="327" r="4.4" fill="rgba(255,214,224,.92)" />
                <circle cx="279" cy="332" r="4.5" fill="rgba(255,214,224,.92)" />
              </g>

              <g id="svg-head">
                <circle cx="210" cy="166" r="114" fill="url(#furGrad)" stroke="rgba(0,0,0,.12)" stroke-width="2.2" filter="url(#furSoft)" />
                <path d="M130 195 C148 216 178 228 210 228 C242 228 272 216 290 195" fill="none" stroke="rgba(255,255,255,.42)" stroke-width="3" stroke-linecap="round" />
              </g>

              <g id="svg-ears">
                <path id="svgEarL" d="M132 95 C117 42 160 30 184 78" fill="url(#furGrad)" stroke="rgba(0,0,0,.12)" stroke-width="2" />
                <path id="svgEarR" d="M288 95 C303 42 260 30 236 78" fill="url(#furGrad)" stroke="rgba(0,0,0,.12)" stroke-width="2" />
                <path d="M142 92 C136 62 160 56 176 82" fill="var(--cat-ear-inner)" opacity=".86" />
                <path d="M278 92 C284 62 260 56 244 82" fill="var(--cat-ear-inner)" opacity=".86" />
              </g>

              <g id="svg-eyes">
                <g class="eye-round">

function createSvgText(x,y,size,icon,extraClass=""){
  const text=document.createElementNS(SVG_NS,"text");
  text.setAttribute("x",String(x));
  text.setAttribute("y",String(y));
  text.setAttribute("text-anchor","middle");
  text.setAttribute("dominant-baseline","middle");
  text.setAttribute("font-size",String(size));
  text.setAttribute("class",`svg-ornament ${extraClass}`.trim());
  text.textContent=icon;
  return text;
}

  const cls=slotKey==="aura"?"aura":"";
  slot.appendChild(createSvgText(cfg.x,cfg.y,cfg.size,icon,cls));
}

function flyToCat(fromNode,icon,cat){
  if(!icon)return;
  const start=fromNode.getBoundingClientRect();
  const end=E.stage.getBoundingClientRect();
  const f=document.createElement("span");
  f.className="fly-ornament";
  f.textContent=icon;
  const slotY={head:80,face:168,neck:264,hand:258,aura:86}[cat]||146;
  f.style.left=`${start.left+start.width/2}px`;
  f.style.top=`${start.top+start.height/2}px`;
  f.style.setProperty("--tx",`${end.left+end.width/2-(start.left+start.width/2)}px`);
  f.style.setProperty("--ty",`${end.top+slotY-(start.top+start.height/2)}px`);
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),420);
}

}

  if(style==="古风")return `${c1}字入笺，轻叩山海远意；${c2}字落墨，温煮人间清欢，`;

function makePoemText(salt=0,style="治愈"){
  const chars=Array.from(profile.name||"");
  const c1=chars[0]||"你";
  const c2=chars[1]||c1||"呀";
  const period=WarmCat.timePeriod();
  const moodPool=MOOD[period]||MOOD.morning;
  const mood=moodPool[WarmCat.hash(`${profile.name}-${fortuneData.title}-${WarmCat.day()}-${salt}`)%moodPool.length];
  const ending=ENDING[WarmCat.hash(`${fortuneData.title}-${profile.name}-${salt}`)%ENDING.length];
  const hobby=profile.hobby?`把「${profile.hobby}」当作今天的小幸运动作，`:"";
  const wish=profile.wish?`愿望「${profile.wish}」正在慢慢靠近，`:"";
  const key=fortuneData.keyword||fortuneData.theme||fortuneData.title;
  return [
    mood,
    poemLineByStyle(style,c1,c2),
    `${hobby}${wish}和「${key}」一起发光。`,
    `愿${profile.name}今天被温柔抱住，${ending}`
  ].join("\n");
}

function rr(ctx,x,y,w,h,r){
  const k=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+k,y);
  ctx.lineTo(x+w-k,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+k);
  ctx.lineTo(x+w,y+h-k);
  ctx.quadraticCurveTo(x+w,y+h,x+w-k,y+h);
  ctx.lineTo(x+k,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-k);
  ctx.lineTo(x,y+k);
  ctx.quadraticCurveTo(x,y,x+k,y);
  ctx.closePath();
}

function wrap(ctx,text,max){
  const chars=Array.from(text||"");
  const out=[];
  let line="";
  chars.forEach((ch)=>{
    const next=line+ch;
    if(ctx.measureText(next).width>max&&line){
      out.push(line);
      line=ch;
    }else{
      line=next;
    }
  });
  if(line)out.push(line);
  return out;
}

function drawPosterBg(ctx,w,h,seed=0){
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,"#FAF7F2");
  grad.addColorStop(1,"#F9EED8");
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,w,h);

  ctx.fillStyle="rgba(217,197,176,.12)";
  for(let i=0;i<84;i+=1){
    const p=WarmCat.hash(`${seed}-${i}-${profile.name}`);
    const px=(p%997)/997*w;
    const py=(p%991)/991*h;
    const s=8+(p%12);
    ctx.beginPath();
    ctx.arc(px-s*1.1,py-s*1.16,s*.36,0,Math.PI*2);
    ctx.arc(px+s*1.1,py-s*1.16,s*.36,0,Math.PI*2);
    ctx.arc(px,py,s*.54,0,Math.PI*2);
    ctx.fill();
  }

  for(let i=0;i<28;i+=1){
    const p=WarmCat.hash(`yarn-${seed}-${i}-${profile.name}`);
    const x=(p%941)/941*w;
    const y=(p%887)/887*h;
    const r=7+(p%13);
    ctx.strokeStyle="rgba(244,168,104,.18)";
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x,y,r*.55,0,Math.PI*2);
    ctx.stroke();
  }
}

}

function drawPlushCat(ctx,cx,cy,scale=1){
  const t=CAT_THEME[state.baseCat]||CAT_THEME.catA;
  const main=t.vars["--cat-main-mid"];
  const light=t.vars["--cat-main-light"];
  const dark=t.vars["--cat-main-dark"];
  const belly=t.vars["--cat-belly"];
  const ear=t.vars["--cat-ear-inner"];
  const eye=t.vars["--cat-eye"];
  ctx.save();
  ctx.translate(cx,cy);
  ctx.scale(scale,scale);

  ctx.fillStyle="rgba(85,62,42,.16)";
  ctx.beginPath();
  ctx.ellipse(0,132,92,18,0,0,Math.PI*2);
  ctx.fill();

  const tailGrad=ctx.createRadialGradient(48,44,8,62,56,88);
  tailGrad.addColorStop(0,light);
  tailGrad.addColorStop(1,dark);
  ctx.strokeStyle=tailGrad;
  ctx.lineWidth=30;
  ctx.lineCap="round";
  ctx.beginPath();
  ctx.arc(78,64,52,-1.06,.7);
  ctx.stroke();

  const bodyGrad=ctx.createRadialGradient(-10,16,20,0,40,110);
  bodyGrad.addColorStop(0,light);
  bodyGrad.addColorStop(.68,main);
  bodyGrad.addColorStop(1,dark);
  ctx.fillStyle=bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0,48,78,72,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle=belly;
  ctx.beginPath();
  ctx.ellipse(0,54,46,44,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle=bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0,-44,90,76,0,0,Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(-56,-88);
  ctx.quadraticCurveTo(-74,-132,-24,-92);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(56,-88);
  ctx.quadraticCurveTo(74,-132,24,-92);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle=ear;
  ctx.beginPath();
  ctx.moveTo(-52,-92);
  ctx.quadraticCurveTo(-62,-114,-35,-94);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(52,-92);
  ctx.quadraticCurveTo(62,-114,35,-94);
  ctx.closePath();
  ctx.fill();

  if(state.baseCat==="catB"){
    ctx.strokeStyle=eye;
    ctx.lineWidth=4;
    ctx.lineCap="round";
    ctx.beginPath();
    ctx.moveTo(-45,-50);
    ctx.quadraticCurveTo(-30,-63,-15,-50);
    ctx.moveTo(15,-50);
    ctx.quadraticCurveTo(30,-63,45,-50);
    ctx.stroke();
  }else{
    ctx.fillStyle=eye;
    const ry=state.baseCat==="catC"?7:16;
    ctx.beginPath();
    ctx.ellipse(-30,-50,18,ry,0,0,Math.PI*2);
    ctx.ellipse(30,-50,18,ry,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.92)";
    ctx.beginPath();
    ctx.arc(-23,-56,5,0,Math.PI*2);
    ctx.arc(37,-56,5,0,Math.PI*2);
    ctx.fill();
  }

  ctx.fillStyle="rgba(255,214,224,.64)";
  ctx.beginPath();
  ctx.ellipse(-46,-20,15,9,0,0,Math.PI*2);
  ctx.ellipse(46,-20,15,9,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle=ear;
  ctx.beginPath();
  ctx.moveTo(0,-26);
  ctx.lineTo(-8,-16);
  ctx.lineTo(8,-16);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle="#8a5a3a";
  ctx.lineWidth=2;
  ctx.lineCap="round";
  ctx.beginPath();
  ctx.moveTo(-8,-8);
  ctx.quadraticCurveTo(0,2,8,-8);
  ctx.moveTo(0,-16);
  ctx.lineTo(0,-6);
  ctx.stroke();

  ctx.fillStyle="rgba(255,214,224,.95)";
  ctx.beginPath();
  ctx.ellipse(-42,96,20,16,0,0,Math.PI*2);
  ctx.ellipse(42,96,20,16,0,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#fff";
  ctx.font="54px 'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif";
  const head=outfitEmoji("head",state.outfit.head);
  const face=outfitEmoji("face",state.outfit.face);
  const neck=outfitEmoji("neck",state.outfit.neck);
  const hand=outfitEmoji("hand",state.outfit.hand);
  const aura=outfitEmoji("aura",state.outfit.aura);
  if(head)ctx.fillText(head,-18,-128);
  if(face)ctx.fillText(face,-16,-2);
  if(neck)ctx.fillText(neck,-18,82);
  if(hand)ctx.fillText(hand,66,96);
  if(aura)ctx.fillText(aura,86,-108);
  ctx.restore();
}

function drawTextBlock(ctx,title,content,x,y,w,h,opt={}){
  drawCard(ctx,x,y,w,h,opt.alpha||.9);
  ctx.fillStyle=opt.titleColor||"#A35A30";
  ctx.font=`700 ${opt.titleSize||46}px 'KaiTi','STKaiti','Microsoft YaHei',sans-serif`;
  ctx.textAlign="left";
  ctx.fillText(title,x+28,y+(opt.titleTop||68));

  ctx.fillStyle=opt.textColor||"#8B5F3F";
  ctx.font=`${opt.textSize||34}px 'Microsoft YaHei','PingFang SC',sans-serif`;
  const lines=Array.isArray(content)?content:[content];
  let py=y+(opt.textTop||116);
  const maxW=w-56;
  const lineStep=opt.lineStep||48;
  lines.forEach((line)=>{
    wrap(ctx,line,maxW).forEach((t)=>{
      if(py<=y+h-30){
        ctx.fillText(t,x+28,py);
        py+=lineStep;
      }
    });
  });
}

function drawFallbackQr(ctx,x,y,size){
  rr(ctx,x,y,size,size,22);
  ctx.fillStyle="#fff";
  ctx.fill();
  ctx.strokeStyle="#D9C5B0";
  ctx.lineWidth=2;
  ctx.stroke();
  const n=21;
  const c=size/n;
  for(let r=0;r<n;r+=1){
    for(let col=0;col<n;col+=1){
      const v=WarmCat.hash(`${SITE_URL}-${r}-${col}`)%5;
      if(v<2){
        ctx.fillStyle="#8B5F3F";
        ctx.fillRect(x+col*c+1,y+r*c+1,c-2,c-2);
      }
    }
  }
  ctx.font="44px 'Segoe UI Emoji','Apple Color Emoji',sans-serif";
  ctx.fillText("🐾",x+size*.36,y+size*.62);
}

function posterText(){
  return [
    `${profile.name} 的暖暖猫咪纪念海报`,
    `幸运签：${fortuneData.title}`,
    `解读：${fortuneData.reading}`,
    `建议：${fortuneData.advice}`,
    `小诗：${state.poem?state.poem.replace(/\n/g," "):"（未生成）"}`,
    WarmCat.wishBlessing(profile.name,profile.wish),
    SITE_URL
  ].join("\n");
}

async function makePoster(seed=0){
  if(!state.poem){
    WarmCat.status(E.poemStatus,"请先生成名字小诗，再导出海报。",true);
    return false;
  }
  const mode=state.posterMode==="landscape"?"landscape":"portrait";
  const size=POSTER_SIZE[mode];
  const c=E.poster;
  c.width=size.w;
  c.height=size.h;
  const ctx=c.getContext("2d");
  const w=c.width;
  const h=c.height;
  const pad=mode==="portrait"?120:94;

  drawPosterBg(ctx,w,h,seed);
  rr(ctx,pad,pad,w-pad*2,h-pad*2,56);
  ctx.fillStyle="rgba(255,251,245,.76)";
  ctx.fill();
  ctx.strokeStyle="rgba(220,191,161,.7)";
  ctx.lineWidth=3;
  ctx.stroke();

  if(mode==="portrait"){
    const innerW=w-pad*2;
    const x=pad+26;
    let y=pad+28;
    const cardW=innerW-52;

    drawCard(ctx,x,y,cardW,280,.92);
    ctx.textAlign="center";
    ctx.fillStyle="#A8532B";
    ctx.font="700 84px 'KaiTi','STKaiti','Microsoft YaHei',sans-serif";
    ctx.fillText("暖暖猫咪幸运站",w/2,y+112);
    ctx.fillStyle="#8F5B39";
    ctx.font="700 42px 'Microsoft YaHei',sans-serif";
    ctx.fillText(`${profile.name} 的今日专属好运`,w/2,y+184);
    ctx.font="30px 'Microsoft YaHei',sans-serif";
    ctx.fillText(`${WarmCat.day()} · 第三层纪念海报`,w/2,y+232);

    y+=320;
    drawCard(ctx,x,y,cardW,1000,.93);
    drawPlushCat(ctx,w/2,y+520,2.56);

    y+=1026;
    drawInfoPills(ctx,x,y,cardW,220);

    y+=246;
    drawTextBlock(ctx,"幸运签",[
      `签文主题：${fortuneData.title}（${fortuneData.keyword}）`,
      `专属解读：${fortuneData.reading}`,
      `今日小建议：${fortuneData.advice}`,
      `猫咪寄语：${fortuneData.message}`
    ],x,y,cardW,452,{titleSize:52,textSize:35,lineStep:50});

    y+=478;
    drawTextBlock(ctx,"名字小诗",state.poem.split("\n"),x,y,cardW,520,{titleSize:52,textSize:36,lineStep:52});

    const qr=await ensureQrImage();
    const qrSize=220;
    const qrX=pad+54;
    const qrY=h-pad-qrSize-66;
    if(qr){
      rr(ctx,qrX,qrY,qrSize,qrSize,24);
      ctx.fillStyle="#fff";
      ctx.fill();
      ctx.drawImage(qr,qrX+14,qrY+14,qrSize-28,qrSize-28);
    }else{
      drawFallbackQr(ctx,qrX,qrY,qrSize);
    }
  }else{
    const innerW=w-pad*2;
    const innerH=h-pad*2;
    const x=pad+24;
    let y=pad+24;

    drawCard(ctx,x,y,innerW-48,236,.92);
    ctx.textAlign="center";
    ctx.fillStyle="#A8532B";
    ctx.font="700 78px 'KaiTi','STKaiti','Microsoft YaHei',sans-serif";
    ctx.fillText("暖暖猫咪幸运站",w/2,y+94);
    ctx.fillStyle="#8F5B39";
    ctx.font="700 40px 'Microsoft YaHei',sans-serif";
    ctx.fillText(`${profile.name} 的今日专属好运`,w/2,y+158);
    ctx.font="28px 'Microsoft YaHei',sans-serif";
    ctx.fillText(`${WarmCat.day()} · 第三层纪念海报`,w/2,y+204);

    y+=262;
    const bodyH=innerH-262-224;
    const leftW=Math.floor((innerW-72)*.44);
    const rightW=innerW-72-leftW;
    drawCard(ctx,x,y,leftW,bodyH,.93);
    drawPlushCat(ctx,x+leftW*0.5,y+bodyH*0.58,2.65);

    const rx=x+leftW+24;
    drawTextBlock(ctx,"幸运签",[
      `签文主题：${fortuneData.title}（${fortuneData.keyword}）`,
      `专属解读：${fortuneData.reading}`,
      `今日小建议：${fortuneData.advice}`,
      `猫咪寄语：${fortuneData.message}`
    ],rx,y,rightW,Math.floor(bodyH*.48),{titleSize:46,textSize:31,lineStep:44});
    drawTextBlock(ctx,"名字小诗",state.poem.split("\n"),rx,y+Math.floor(bodyH*.48)+20,rightW,bodyH-Math.floor(bodyH*.48)-20,{titleSize:46,textSize:32,lineStep:46});

    drawInfoPills(ctx,x, h-pad-190, innerW-48,136);
  }

  drawFooter(ctx,w,h,pad);

  const url=c.toDataURL("image/png");
  state.posterUrl=url;
  E.previewImg.src=url;
  E.previewImg.style.display="block";
  E.download.href=url;
  E.download.download=`warm-cat-${mode}-${WarmCat.day()}.png`;
  E.download.classList.remove("hide");
  E.posterBadge.textContent=`生成时间：${new Date().toLocaleString()}`;
  updateSummary();
  return true;
}

async function previewPoster(){
  await makePoster(0);
}

async function savePoster(){
  if(!state.posterUrl){
    const ok=await makePoster(0);
    if(!ok)return;
  }
  E.posterPanel.classList.remove("poster-save-pop");
  void E.posterPanel.offsetWidth;
  E.posterPanel.classList.add("poster-save-pop");
  setTimeout(()=>E.posterPanel.classList.remove("poster-save-pop"),520);
  E.download.click();
}

async function sharePosterText(){
  if(!state.poem){
    WarmCat.status(E.poemStatus,"请先生成名字小诗后再复制文案。",true);
    return;
  }
  const text=posterText();
  if(navigator.clipboard&&navigator.clipboard.writeText){
    try{
      await navigator.clipboard.writeText(text);
      WarmCat.status(E.poemStatus,"文案已复制，可直接粘贴分享。");
      return;
    }catch{}
  }
  WarmCat.status(E.poemStatus,"当前环境不支持剪贴板复制。",true);
}

async function regenPoster(){
  await makePoster(Math.floor(Math.random()*100000));
}

E.makePoem.addEventListener("click",()=>makePoem(0,state.poemStyle));
E.remakePoem.addEventListener("click",()=>{
  const idx=(POEM_STYLES.indexOf(state.poemStyle)+1)%POEM_STYLES.length;
  makePoem(Math.floor(Math.random()*10000)+1,POEM_STYLES[idx]);
});
E.randomOutfit.addEventListener("click",()=>{void randomOutfit();});
E.clearOutfit.addEventListener("click",clearOutfit);
E.stage.addEventListener("click",(ev)=>handleStageTap(ev));
E.stage.setAttribute("tabindex","0");
E.stage.addEventListener("keydown",(ev)=>{
  if(ev.key==="Enter"||ev.key===" "){
    ev.preventDefault();
    handleStageTap();
  }
});

E.previewPoster.addEventListener("click",()=>{void previewPoster();});
E.savePoster.addEventListener("click",()=>{void savePoster();});
E.sharePoster.addEventListener("click",()=>{void sharePosterText();});
E.regenPoster.addEventListener("click",()=>{void regenPoster();});

E.modePortrait.addEventListener("click",()=>setPosterMode("portrait",true));
E.modeLandscape.addEventListener("click",()=>setPosterMode("landscape",true));

WarmCat.initMusic(E.musicToggle,E.musicVolume,E.bgMusic,E.poemStatus);
WarmCat.initCuteBg(E.bgCute);

buildBaseSwitch();
renderCategoryTabs();
renderOptionsGrid();
applyOutfit(false,false);
applyTransitionHint();
const loadedPoem=loadPoem();
if(!loadedPoem){
  updatePoemStyleText();
}
setPosterMode("portrait",false);
scheduleBlink();
dailyGreeting();
updateSummary();
</script>
</body>
