<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>暖暖猫咪幸运站 - 欢迎页</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="paw-bg">
<div class="bg-cute" id="bgCute"></div>
<main>
  <section class="hero welcome-hero">
    <h1>暖暖猫咪幸运站</h1>
    <p class="welcome-sub">欢迎来到今日治愈小宇宙。先收下祝福，再决定要不要立刻开始游戏。</p>

    <div class="emoji-wall" aria-label="可爱表情包">
      <span class="emoji-chip">😺</span>
      <span class="emoji-chip">🥳</span>
      <span class="emoji-chip">🧡</span>
      <span class="emoji-chip">✨</span>
      <span class="emoji-chip">🐾</span>
      <span class="emoji-chip">🌸</span>
      <span class="emoji-chip">🍀</span>
      <span class="emoji-chip">🎀</span>
      <span class="emoji-chip">💖</span>
    </div>

    <div class="bless-grid" aria-label="祝福文案框">
      <div class="bless-card c1">愿你今天被好运抱住，烦恼自动变小。</div>
      <div class="bless-card c2">愿你想做的事，都能顺顺利利开始。</div>
      <div class="bless-card c3">愿你和可爱的小猫一样，元气又自在。</div>
    </div>

    <article class="welcome-panel">
      <span class="tag">入口页</span>
      <h2>现在开始游戏吗？</h2>
      <small>流程：第一层信息填写 → 第二层抽幸运签 → 第三层小诗 + 换装 + 纪念海报</small>

      <div class="row welcome-actions">
        <button id="startGame" class="pri" type="button" aria-label="开始游戏">开始游戏</button>
        <button id="laterBtn" class="sec" type="button" aria-label="稍后开始">先收下祝福</button>
      </div>
      <div class="status welcome-status" id="welcomeStatus" aria-live="polite"></div>

      <div class="row" style="justify-content:center">
        <button id="musicToggle" class="sec" type="button" aria-label="播放或暂停舒缓音乐">播放舒缓音乐</button>
        <input id="musicVolume" type="range" min="0" max="100" value="40" style="width:140px" aria-label="音乐音量" />
      </div>
    </article>
  </section>
</main>

<audio id="bgMusic" preload="auto" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg" />
</audio>

<script src="common.js"></script>
<script>
const E={
  bgCute:document.getElementById("bgCute"),
  startGame:document.getElementById("startGame"),
  laterBtn:document.getElementById("laterBtn"),
  welcomeStatus:document.getElementById("welcomeStatus"),
  musicToggle:document.getElementById("musicToggle"),
  musicVolume:document.getElementById("musicVolume"),
  bgMusic:document.getElementById("bgMusic")
};

const LATER_WORDS=[
  "先摸摸小猫再出发，今天也会很顺。",
  "祝福已装进背包，随时都能开始。",
  "慢慢来也很好，幸运会等你。",
  "给你一颗暖暖小心心：准备好再点开始。"
];

function popHint(msg){
  const el=document.createElement("div");
  el.className="hint-pop";
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1700);
}

function boot(){
  const p=WarmCat.readJSON(WarmCat.KEYS.profile);
  if(p&&p.name){
    E.startGame.textContent="继续游戏";
    E.welcomeStatus.textContent=`欢迎回来，${p.name}。可以继续你的猫咪幸运之旅。`;
  }else{
    E.welcomeStatus.textContent=WarmCat.timeGreeting();
  }
}

E.startGame.onclick=()=>{
  popHint("出发咯，去第一层填写信息～");
  setTimeout(()=>{location.href="layer1.html";},420);
};

E.laterBtn.onclick=()=>{
  const msg=LATER_WORDS[Math.floor(Math.random()*LATER_WORDS.length)];
  E.welcomeStatus.textContent=msg;
  popHint("祝福+1 ✨");
};

WarmCat.initCuteBg(E.bgCute);
WarmCat.initMusic(E.musicToggle,E.musicVolume,E.bgMusic,E.welcomeStatus);
boot();
</script>
</body>
</html>
