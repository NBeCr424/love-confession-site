<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>暖暖猫咪幸运站 - 第一层</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="paw-bg">
<div class="bg-cute" id="bgCute"></div>
<main>
  <section class="hero">
    <h1>暖暖猫咪幸运站</h1>
    <p>第一层保存资料。完成后进入第二层抽今日幸运签。</p>
    <div class="steps">
      <button class="step-btn on" type="button">第 1 层 信息</button>
      <button class="step-btn" type="button" disabled>第 2 层 幸运签</button>
      <button class="step-btn" type="button" disabled>第 3 层 小诗+换装</button>
    </div>
    <div class="row" style="justify-content:center">
      <button id="musicToggle" class="sec" type="button">播放舒缓音乐</button>
      <input id="musicVolume" type="range" min="0" max="100" value="40" style="width:140px" aria-label="音乐音量" />
    </div>
  </section>

  <section class="grid">
    <article class="card">
      <span class="tag">第一层</span>
      <h2>填写并保存信息</h2>
      <small>数据会保存在浏览器 localStorage</small>

      <div class="form">
        <div class="item"><label for="name">名字 *</label><input id="name" maxlength="20" placeholder="例如：小橘" /></div>
        <div class="item"><label for="age">年龄 *</label><input id="age" type="number" min="1" max="120" placeholder="例如：18" /></div>
        <div class="item"><label for="city">城市</label><input id="city" maxlength="20" placeholder="例如：上海" /></div>
        <div class="item"><label for="hobby">喜欢的事</label><input id="hobby" maxlength="40" placeholder="例如：晒太阳" /></div>
        <div class="item full"><label for="wish">今日小愿望</label><textarea id="wish" rows="2" maxlength="80" placeholder="写下一件想实现的小事"></textarea></div>
      </div>

      <div class="row">
        <button id="saveProfile" class="pri" type="button">保存信息</button>
        <button id="loadProfile" class="sec" type="button">读取已保存信息</button>
        <button id="toLayer2" class="next" type="button">完成第一层，进入第二层</button>
      </div>
      <div class="status" id="profileStatus"></div>

      <div class="cat-trio-wrap">
        <div class="cat-trio">
          <button id="catA" class="mini-cat orange" type="button" aria-label="小橘猫">
            <span class="ear l"></span><span class="ear r"></span><span class="head"></span>
            <span class="eye l"></span><span class="eye r"></span><span class="nose"></span><span class="mouth">ω</span>
            <span class="whisk l1"></span><span class="whisk l2"></span><span class="whisk r1"></span><span class="whisk r2"></span>
          </button>
          <button id="catB" class="mini-cat white" type="button" aria-label="小白猫">
            <span class="ear l"></span><span class="ear r"></span><span class="head"></span>
            <span class="eye l"></span><span class="eye r"></span><span class="nose"></span><span class="mouth">ω</span>
            <span class="whisk l1"></span><span class="whisk l2"></span><span class="whisk r1"></span><span class="whisk r2"></span>
          </button>
          <button id="catC" class="mini-cat gray" type="button" aria-label="小灰猫">
            <span class="ear l"></span><span class="ear r"></span><span class="head"></span>
            <span class="eye l"></span><span class="eye r"></span><span class="nose"></span><span class="mouth">ω</span>
            <span class="whisk l1"></span><span class="whisk l2"></span><span class="whisk r1"></span><span class="whisk r2"></span>
          </button>
        </div>
        <div class="cat-note">sweet cat ♡ 点击小猫会喵喵叫</div>
      </div>
    </article>
  </section>
</main>

<audio id="bgMusic" preload="auto" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg" />
</audio>

<script src="common.js"></script>
<script>
const E={
  bgCute:document.getElementById("bgCute"),
  name:document.getElementById("name"),
  age:document.getElementById("age"),
  city:document.getElementById("city"),
  hobby:document.getElementById("hobby"),
  wish:document.getElementById("wish"),
  saveProfile:document.getElementById("saveProfile"),
  loadProfile:document.getElementById("loadProfile"),
  toLayer2:document.getElementById("toLayer2"),
  profileStatus:document.getElementById("profileStatus"),
  musicToggle:document.getElementById("musicToggle"),
  musicVolume:document.getElementById("musicVolume"),
  bgMusic:document.getElementById("bgMusic")
};

let meowCtx=null;

function collectProfile(){
  const p={
    name:E.name.value.trim(),
    age:Number(E.age.value),
    city:E.city.value.trim(),
    hobby:E.hobby.value.trim(),
    wish:E.wish.value.trim()
  };
  if(!p.name){WarmCat.status(E.profileStatus,"请先输入名字。",true);return null;}
  if(!Number.isInteger(p.age)||p.age<1||p.age>120){WarmCat.status(E.profileStatus,"年龄需要是 1-120 的整数。",true);return null;}
  return p;
}

function applyProfile(p){
  E.name.value=p.name||"";
  E.age.value=p.age||"";
  E.city.value=p.city||"";
  E.hobby.value=p.hobby||"";
  E.wish.value=p.wish||"";
}

function saveProfile(){
  const p=collectProfile();
  if(!p)return false;
  WarmCat.writeJSON(WarmCat.KEYS.profile,p);
  WarmCat.status(E.profileStatus,`已保存：${p.name}（${p.age} 岁）。`);
  return true;
}

function loadProfile(showMsg=true){
  const p=WarmCat.readJSON(WarmCat.KEYS.profile);
  if(!p){if(showMsg)WarmCat.status(E.profileStatus,"当前浏览器还没有保存过信息。",true);return false;}
  applyProfile(p);
  if(showMsg)WarmCat.status(E.profileStatus,`已读取：${p.name}（${p.age} 岁）。`);
  return true;
}

E.saveProfile.onclick=saveProfile;
E.loadProfile.onclick=()=>loadProfile(true);
E.toLayer2.onclick=()=>{
  if(!saveProfile())return;
  location.href="layer2.html";
};

function playMeow(seed){
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC)return;
  if(!meowCtx)meowCtx=new AC();
  const ctx=meowCtx;
  const start=ctx.currentTime;
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.type="triangle";
  const base=480+seed*40;
  osc.frequency.setValueAtTime(base,start);
  osc.frequency.exponentialRampToValueAtTime(base*0.62,start+0.15);
  gain.gain.setValueAtTime(0.001,start);
  gain.gain.exponentialRampToValueAtTime(0.18,start+0.03);
  gain.gain.exponentialRampToValueAtTime(0.002,start+0.2);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(start);
  osc.stop(start+0.22);
}

function meowAndPop(id,seed){
  const cat=document.getElementById(id);
  if(!cat)return;
  playMeow(seed);
  cat.classList.remove("meow-pop");
  void cat.offsetWidth;
  cat.classList.add("meow-pop");
  setTimeout(()=>cat.classList.remove("meow-pop"),260);
}

document.getElementById("catA").addEventListener("click",()=>meowAndPop("catA",1));
document.getElementById("catB").addEventListener("click",()=>meowAndPop("catB",2));
document.getElementById("catC").addEventListener("click",()=>meowAndPop("catC",3));

WarmCat.initCuteBg(E.bgCute);
WarmCat.initMusic(E.musicToggle,E.musicVolume,E.bgMusic,E.profileStatus);
loadProfile(false);
</script>
</body>
</html>
