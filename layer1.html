<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>暖暖猫咪幸运站 - 第一层</title>
<link rel="stylesheet" href="style.css" />
<style>
.layer1-page{
  background:
    radial-gradient(circle at 18px 14px,rgba(139,115,85,.06) 0 4px,transparent 4px),
    radial-gradient(circle at 33px 14px,rgba(139,115,85,.06) 0 4px,transparent 4px),
    radial-gradient(circle at 25px 25px,rgba(139,115,85,.07) 0 6px,transparent 6px),
    radial-gradient(circle at 18px 36px,rgba(139,115,85,.06) 0 4px,transparent 4px),
    radial-gradient(circle at 33px 36px,rgba(139,115,85,.06) 0 4px,transparent 4px),
    radial-gradient(circle at 25px 46px,rgba(139,115,85,.07) 0 8px,transparent 8px),
    radial-gradient(circle at 74% 24%,rgba(217,197,176,.06) 0 18px,transparent 18px),
    radial-gradient(circle at 78% 28%,rgba(217,197,176,.05) 0 22px,transparent 22px),
    linear-gradient(180deg,#FAF7F2 0%,#F9EED8 100%);
  background-size:118px 118px,118px 118px,118px 118px,118px 118px,118px 118px,118px 118px,220px 220px,260px 260px,auto;
  color:#8B7355;
}

.layer1-page h1{
  font-family:"STKaiti","KaiTi","YouYuan","Comic Sans MS",cursive;
  color:#8B6549;
  letter-spacing:1px;
  text-shadow:1px 1px 0 #EAD9C6;
}

.layer1-page .hero p{
  font-size:1.08rem;
  line-height:1.9;
  color:#8B7355;
}

.layer1-page .steps{gap:10px;margin-top:16px}
.layer1-page .step-btn{
  min-height:44px;
  padding:10px 18px;
  border-radius:999px;
  border-color:#D9C5B0;
  background:#FFF9F1;
  color:#8B7355;
}
.layer1-page .step-btn.on{
  background:linear-gradient(180deg,#F4A868,#F2995E);
  border-color:#F2995E;
  color:#fff;
  box-shadow:0 10px 16px rgba(242,153,94,.28);
}
.layer1-page .step-btn.locked,.layer1-page .step-btn:disabled{
  background:rgba(255,250,242,.88);
  border-color:#D9C5B0;
  opacity:.6;
}
.layer1-page .step-track{
  height:12px;
  border-color:#D9C5B0;
  background:#FFF9F1;
}
.layer1-page .step-fill{
  background:
    radial-gradient(circle at 8px 6px,rgba(255,255,255,.34) 0 2.5px,transparent 2.5px),
    linear-gradient(90deg,#F4A868,#F2995E);
  background-size:20px 12px,auto;
}

.layer1-page .music-wrap{gap:12px}
.layer1-page #musicToggle{
  position:relative;
  border-radius:20px;
  padding:10px 18px 10px 20px;
  border:1px solid #D9C5B0;
  background:linear-gradient(180deg,#FFF4E8,#FFE8D6);
  color:#8B7355;
}
.layer1-page #musicToggle:before{
  content:"🐾 ";
}
.layer1-page #musicToggle:after{
  content:"";
  position:absolute;
  top:-5px;
  left:12px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:#FFE8D1;
  box-shadow:12px 0 0 #FFE8D1,24px 0 0 #FFE8D1;
}

.layer1-page #musicVolume{
  accent-color:#F4A868;
}
.layer1-page #musicVolume::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;
  height:18px;
  border-radius:50%;
  border:1px solid #D9C5B0;
  background:
    radial-gradient(circle at 50% 46%,#F4A868 0 5px,transparent 5px),
    radial-gradient(circle at 5px 6px,#F2995E 0 2px,transparent 2px),
    radial-gradient(circle at 13px 6px,#F2995E 0 2px,transparent 2px),
    radial-gradient(circle at 9px 3px,#F2995E 0 2px,transparent 2px),
    #FFF8EE;
}
.layer1-page #musicVolume::-moz-range-thumb{
  width:18px;
  height:18px;
  border-radius:50%;
  border:1px solid #D9C5B0;
  background:
    radial-gradient(circle at 50% 46%,#F4A868 0 5px,transparent 5px),
    radial-gradient(circle at 5px 6px,#F2995E 0 2px,transparent 2px),
    radial-gradient(circle at 13px 6px,#F2995E 0 2px,transparent 2px),
    radial-gradient(circle at 9px 3px,#F2995E 0 2px,transparent 2px),
    #FFF8EE;
}

.layer1-page .card{
  border-radius:20px;
  border:1px solid rgba(217,197,176,.82);
  box-shadow:0 10px 24px rgba(205,171,138,.22);
  background:rgba(255,252,247,.94);
  padding:20px;
  overflow:hidden;
  animation:formSlideUp .5s ease both;
}

.layer1-page .mini-cat-corner{
  position:absolute;
  left:16px;
  top:14px;
  z-index:1;
  background:rgba(255,214,224,.45);
  border:1px solid rgba(217,197,176,.9);
  border-radius:999px;
  padding:5px 8px;
  line-height:1;
  box-shadow:0 4px 10px rgba(210,174,140,.24);
}

.layer1-page .tag{margin-left:58px}
.layer1-page h2{margin-top:10px}

.layer1-page .form{
  margin-top:14px;
  gap:18px;
}
.layer1-page .item{
  gap:6px;
}
.layer1-page .item label{
  font-weight:700;
  color:#8B7355;
}
.layer1-page .req-heart{
  color:#FFD6E0;
  text-shadow:0 1px 0 #fff;
  margin-left:4px;
}

.layer1-page input,
.layer1-page textarea{
  min-height:44px;
  border-radius:12px;
  border-color:#D9C5B0;
  background-color:#FFFBF5;
  background-image:
    radial-gradient(circle at 16px 12px,rgba(217,197,176,.17) 0 2px,transparent 2px),
    radial-gradient(circle at 24px 12px,rgba(217,197,176,.17) 0 2px,transparent 2px),
    radial-gradient(circle at 20px 20px,rgba(217,197,176,.18) 0 3px,transparent 3px),
    radial-gradient(circle at 16px 27px,rgba(217,197,176,.17) 0 2px,transparent 2px),
    radial-gradient(circle at 24px 27px,rgba(217,197,176,.17) 0 2px,transparent 2px);
  background-repeat:no-repeat;
  padding:12px 16px;
  color:#8B7355;
  line-height:1.5;
  transition:transform .3s ease,border-color .3s ease,box-shadow .3s ease;
}
.layer1-page input::placeholder,
.layer1-page textarea::placeholder{color:#B49F8A}
.layer1-page input:hover,
.layer1-page textarea:hover,
.layer1-page input:focus,
.layer1-page textarea:focus{
  border-color:#F4A868;
  box-shadow:0 0 0 1px rgba(244,168,104,.65),0 0 10px rgba(244,168,104,.24);
  transform:scale(1.01);
}

.layer1-page .field-tip{
  color:#A6937C;
  font-family:"STXingkai","KaiTi","Segoe Script",cursive;
  font-size:.82rem;
}
.layer1-page .field-tip:not(:empty):before{
  content:"🐱 ";
}

.layer1-page .row{
  margin-top:16px;
  gap:14px;
}

.layer1-page button,
.layer1-page a.btn{
  min-height:44px;
  padding:11px 18px;
}

.layer1-page #saveProfile,
.layer1-page #toLayer2{
  position:relative;
  border-radius:16px;
  border:1px solid rgba(255,247,235,.9);
  background:linear-gradient(180deg,#F4A868,#F2995E);
  color:#fff;
  text-shadow:0 1px 0 rgba(255,255,255,.35);
  box-shadow:inset 0 1px 0 rgba(255,249,241,.92),0 10px 16px rgba(242,153,94,.25);
  padding-left:36px;
}
.layer1-page #saveProfile:before,
.layer1-page #toLayer2:before{
  content:"🐾";
  position:absolute;
  left:13px;
  top:50%;
  transform:translateY(-50%);
  font-size:.92rem;
}

.layer1-page #loadProfile,
.layer1-page #clearProfile{
  border-radius:16px;
  border:1px solid #D9C5B0;
  background:transparent;
  color:#8B7355;
}

.layer1-page #loadProfile:hover,
.layer1-page #clearProfile:hover{
  background:#F9EED8;
}

.layer1-page button:hover{transform:scale(1.02)}
.layer1-page button:active{transform:scale(.98)}
.layer1-page button,
.layer1-page .step-btn,
.layer1-page input,
.layer1-page textarea{
  touch-action:manipulation;
}

.layer1-page .cat-trio-wrap{
  margin-top:22px;
  border-radius:16px;
  border:1px solid #E8D1BC;
  background:linear-gradient(160deg,rgba(255,251,244,.94),rgba(255,239,221,.93));
  box-shadow:0 8px 20px rgba(209,171,137,.22);
  padding:20px 16px 14px;
  animation:catsFadeIn .3s ease both;
}
.layer1-page .cat-trio{gap:28px}
.layer1-page .mini-cat{
  width:148px;
  height:132px;
}
.layer1-page .mini-cat:not(.cat-click):not(.pressing):not(.daily-greet){
  animation:catBreath 3s ease-in-out infinite;
}
.layer1-page .mini-cat .head,
.layer1-page .mini-cat .ear{
  border-color:#6F4225;
}
.layer1-page .mini-cat.orange .head,
.layer1-page .mini-cat.orange .ear{
  background:linear-gradient(180deg,#FCD391,#F9C870);
}
.layer1-page .mini-cat.white .head,
.layer1-page .mini-cat.white .ear{
  background:linear-gradient(180deg,#F8F8F8,#F0F0F0);
}
.layer1-page .mini-cat.gray .head,
.layer1-page .mini-cat.gray .ear{
  background:linear-gradient(180deg,#D8D8D8,#C7C7C7);
}
.layer1-page .mini-cat.orange .head{
  transform:translateX(-50%) rotate(-5deg);
}
.layer1-page .mini-cat.white .ear.l{
  transform:rotate(-24deg) translateY(3px);
}
.layer1-page .mini-cat.white .ear.r{
  transform:rotate(24deg) translateY(3px);
}
.layer1-page .mini-cat.white .ear{top:3px}
.layer1-page .mini-cat.gray .eye{
  height:7px;
  top:48px;
  border-radius:999px;
}
.layer1-page .mini-cat .head:before,
.layer1-page .mini-cat .head:after{
  content:"";
  position:absolute;
  top:35px;
  width:16px;
  height:10px;
  border-radius:999px;
  background:rgba(255,214,224,.56);
}
.layer1-page .mini-cat .head:before{left:17px}
.layer1-page .mini-cat .head:after{right:17px}
.layer1-page .mini-cat:hover .head:before,
.layer1-page .mini-cat:hover .head:after{
  background:rgba(255,214,224,.76);
}
.layer1-page .mini-cat .eye{
  background:#5F412E;
  box-shadow:inset -1px -1px 0 rgba(255,255,255,.18);
}
.layer1-page .mini-cat .eye:after{
  content:"";
  position:absolute;
  right:1px;
  top:1px;
  width:3px;
  height:3px;
  border-radius:50%;
  background:rgba(255,255,255,.9);
}

.layer1-page .cat-note{
  margin-top:10px;
  color:#F4A868;
  font-family:"STXingkai","KaiTi","Segoe Script",cursive;
  font-size:1.05rem;
}
.layer1-page .cat-note:before{content:"🐾 "}

@keyframes formSlideUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes catsFadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes catBreath{
  0%,100%{transform:scale(.98)}
  50%{transform:scale(1.02)}
}

@media (max-width:760px){
  .layer1-page .form{gap:14px}
  .layer1-page .mini-cat{width:130px;height:118px}
  .layer1-page .row{gap:10px}
}
</style>
</head>
<body class="paw-bg layer1-page">
<div class="bg-cute" id="bgCute"></div>
<div class="petal-cloud" id="petalCloud"></div>
<main>
  <section class="hero">
    <h1>暖暖猫咪幸运站</h1>
    <p id="greetingText">第一层保存资料。完成后进入第二层抽今日幸运签。🐱</p>

    <div class="steps" aria-label="流程步骤">
      <button id="step1" class="step-btn on" type="button" aria-label="当前在第一层">第 1 层 信息</button>
      <button id="step2" class="step-btn locked" type="button" disabled aria-label="第二层未解锁">第 2 层 幸运签</button>
      <button id="step3" class="step-btn locked" type="button" disabled aria-label="第三层未解锁">第 3 层 小诗+换装</button>
    </div>
    <div class="step-track" aria-hidden="true"><span id="stepFill" class="step-fill p1"></span></div>

    <div class="row music-row">
      <div class="music-wrap">
        <button id="musicToggle" class="sec" type="button" aria-label="播放或暂停舒缓音乐">播放舒缓音乐</button>
        <label class="volume-wrap" for="musicVolume">
          音量
          <input id="musicVolume" type="range" min="0" max="100" value="40" aria-label="音乐音量" />
          <span id="musicVolumeText" class="volume-text">40%</span>
        </label>
      </div>
    </div>
    <div id="musicMeta" class="music-meta" aria-live="polite">舒缓音乐已暂停</div>
  </section>

  <section class="grid">
    <article class="card">
      <span class="mini-cat-corner" aria-hidden="true">🐱</span>
      <span class="tag">第一层</span>
      <h2>填写并保存信息</h2>
      <small>名字与年龄是必填项，先轻轻填好，我们再一起进入下一层。</small>

      <div class="form" id="profileForm">
        <div class="item">
          <label for="name">名字 <span class="req-heart" aria-hidden="true">❤️</span></label>
          <input id="name" maxlength="20" placeholder="例如：小橘" aria-label="名字，必填" />
          <div id="nameTip" class="field-tip" aria-live="polite"></div>
        </div>
        <div class="item">
          <label for="age">年龄 <span class="req-heart" aria-hidden="true">❤️</span></label>
          <input id="age" type="text" inputmode="numeric" maxlength="3" placeholder="例如：18" aria-label="年龄，必填，正整数" />
          <div id="ageTip" class="field-tip" aria-live="polite"></div>
        </div>
        <div class="item"><label for="city">城市</label><input id="city" maxlength="20" placeholder="例如：上海" aria-label="城市" /></div>
        <div class="item"><label for="hobby">喜欢的事</label><input id="hobby" maxlength="40" placeholder="例如：晒太阳、看电影" aria-label="喜欢的事情" /></div>
        <div class="item full">
          <label for="wish">今日小愿望 <span id="wishCount" class="char-count">0/80</span></label>
          <textarea id="wish" rows="2" maxlength="80" placeholder="比如：暴富、变美、吃好吃的～" aria-label="今日小愿望"></textarea>
        </div>
      </div>

      <div class="row">
        <button id="saveProfile" class="pri" type="button" aria-label="保存信息">保存信息</button>
        <button id="loadProfile" class="sec" type="button" aria-label="读取已保存信息">读取已保存信息</button>
        <button id="clearProfile" class="sec" type="button" aria-label="清空信息">清空信息</button>
        <button id="toLayer2" class="next" type="button" disabled aria-label="完成第一层进入第二层">完成第一层，进入第二层</button>
      </div>
      <div class="status" id="profileStatus" aria-live="polite"></div>

      <div id="catTrioWrap" class="cat-trio-wrap">
        <div class="cat-trio">
          <button id="catA" data-cat="catA" class="mini-cat orange" type="button" aria-label="小奶橘，元气活泼猫咪">
            <span class="ear l"></span><span class="ear r"></span><span class="head"></span>
            <span class="eye l"></span><span class="eye r"></span><span class="nose"></span><span class="mouth">ω</span>
            <span class="whisk l1"></span><span class="whisk l2"></span><span class="whisk r1"></span><span class="whisk r2"></span>
          </button>
          <button id="catB" data-cat="catB" class="mini-cat white" type="button" aria-label="小白猫，温柔治愈猫咪">
            <span class="ear l"></span><span class="ear r"></span><span class="head"></span>
            <span class="eye l"></span><span class="eye r"></span><span class="nose"></span><span class="mouth">ω</span>
            <span class="whisk l1"></span><span class="whisk l2"></span><span class="whisk r1"></span><span class="whisk r2"></span>
          </button>
          <button id="catC" data-cat="catC" class="mini-cat gray" type="button" aria-label="小灰猫，佛系沉稳猫咪">
            <span class="ear l"></span><span class="ear r"></span><span class="head"></span>
            <span class="eye l"></span><span class="eye r"></span><span class="nose"></span><span class="mouth">ω</span>
            <span class="whisk l1"></span><span class="whisk l2"></span><span class="whisk r1"></span><span class="whisk r2"></span>
          </button>
        </div>
        <div id="catNote" class="cat-note">轻触会喵喵叫，长按 0.8 秒会触发深度陪伴互动。</div>
      </div>
    </article>
  </section>
</main>

<audio id="bgMusic" preload="auto" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg" />
</audio>

<script src="common.js"></script>
<script>
const E={
  bgCute:document.getElementById("bgCute"),
  petalCloud:document.getElementById("petalCloud"),
  greetingText:document.getElementById("greetingText"),
  step1:document.getElementById("step1"),
  step2:document.getElementById("step2"),
  step3:document.getElementById("step3"),
  stepFill:document.getElementById("stepFill"),
  name:document.getElementById("name"),
  age:document.getElementById("age"),
  city:document.getElementById("city"),
  hobby:document.getElementById("hobby"),
  wish:document.getElementById("wish"),
  wishCount:document.getElementById("wishCount"),
  nameTip:document.getElementById("nameTip"),
  ageTip:document.getElementById("ageTip"),
  saveProfile:document.getElementById("saveProfile"),
  loadProfile:document.getElementById("loadProfile"),
  clearProfile:document.getElementById("clearProfile"),
  toLayer2:document.getElementById("toLayer2"),
  profileStatus:document.getElementById("profileStatus"),
  catTrioWrap:document.getElementById("catTrioWrap"),
  catNote:document.getElementById("catNote"),
  musicToggle:document.getElementById("musicToggle"),
  musicVolume:document.getElementById("musicVolume"),
  musicVolumeText:document.getElementById("musicVolumeText"),
  musicMeta:document.getElementById("musicMeta"),
  bgMusic:document.getElementById("bgMusic")
};

const CAT_IDS=["catA","catB","catC"];
const CAT_CFG={
  catA:{
    key:"catA",
    hoverClass:"hover-orange",
    clickVfx:["🐾","✨","⭐"],
    holdVfx:["⭐","✨"],
    sounds:{
      hover:{name:"soft",ratio:.30,rate:1.18,cutMs:100},
      click:{name:"short",ratio:.60,rate:1.15,cutMs:320},
      hold:{name:"long",ratio:.40,rate:1.06,loop:true}
    }
  },
  catB:{
    key:"catB",
    hoverClass:"hover-white",
    clickVfx:["💗","💖","✨"],
    holdVfx:["💗","💞"],
    sounds:{
      hover:{name:"soft",ratio:.30,rate:.95,cutMs:110},
      click:{name:"long",ratio:.60,rate:1.0,cutMs:500},
      hold:{name:"purr",ratio:.40,rate:1.0,loop:true}
    }
  },
  catC:{
    key:"catC",
    hoverClass:"hover-gray",
    clickVfx:["💤","✨","🌙"],
    holdVfx:["💤","🌙"],
    sounds:{
      hover:{name:"purr",ratio:.30,rate:.84,cutMs:100},
      click:{name:"long",ratio:.60,rate:.86,cutMs:400},
      hold:{name:"purr",ratio:.40,rate:.78,loop:true}
    }
  }
};

const SOUND_SRC={
  short:"assets/audio/cat_meow_short.wav",
  long:"assets/audio/cat_meow_long.wav",
  soft:"assets/audio/cat_kitten_soft.wav",
  purr:"assets/audio/cat_purr_loop.wav"
};

const TEXT_POOL={
  catA:{
    click:[
      {id:"a1",text:(c)=>`${c.name}，先给自己一个大大的赞。`},
      {id:"a2",text:(c)=>`你今天的节奏很好，继续冲呀。`},
      {id:"a3",text:(c)=>`${c.name}，慢慢填也会很厉害。`},
      {id:"a4",text:(c)=>`愿望「${c.wish}」已经在靠近你。`},
      {id:"a5",text:()=>`小奶橘贴贴：今天会有小惊喜。`},
      {id:"a6",text:(c)=>`${c.timeHint}，你会稳稳向前。`},
      {id:"a7",text:(c)=>`${c.call}，现在的你已经很棒。`},
      {id:"a8",text:()=>`不着急，快乐和好运一起到。`}
    ],
    hold:[
      {id:"a9",text:(c)=>`${c.name}，我陪你把焦虑吹散。`},
      {id:"a10",text:()=>`呼吸一下，心会慢慢软下来。`},
      {id:"a11",text:(c)=>`愿你今天也被温柔好好抱住。`}
    ],
    egg:[
      {id:"a12",text:(c)=>`贴贴彩蛋：${c.name}，连点五次太可爱啦，愿你今天元气满满。`}
    ]
  },
  catB:{
    click:[
      {id:"b1",text:(c)=>`${c.name}，你可以慢慢来，不必着急。`},
      {id:"b2",text:()=>`我在你身边，安静陪你填完。`},
      {id:"b3",text:(c)=>`愿望「${c.wish}」值得被温柔实现。`},
      {id:"b4",text:()=>`先放松肩膀，再继续下一步吧。`},
      {id:"b5",text:(c)=>`${c.timeHint}，你会被温柔照亮。`},
      {id:"b6",text:(c)=>`${c.call}，今天也请善待自己。`},

function showHint(msg){
  const hint=document.createElement("div");
  hint.className="hint-pop";
  hint.textContent=msg;
  document.body.appendChild(hint);
  setTimeout(()=>hint.remove(),1700);
}

function wait(ms){
  return new Promise((resolve)=>setTimeout(resolve,ms));
}

function setBtnLoading(btn,isLoading){
  if(!btn)return;
  btn.classList.toggle("btn-loading",isLoading);
  btn.disabled=Boolean(isLoading)||btn.disabled;
}

function getDraftProfile(){
  return {
    name:E.name.value.trim(),
    age:Number(E.age.value),
    city:E.city.value.trim(),
    hobby:E.hobby.value.trim(),
    wish:E.wish.value.trim()
  };
}

function safeAgeInput(){
  const cleaned=E.age.value.replace(/[^\d]/g,"").slice(0,3);
  if(cleaned!==E.age.value)E.age.value=cleaned;
}

function checkProfile(profile){
  if(!profile.name)return {ok:false,field:"name",msg:"先告诉我你的名字吧～"};
  if(!Number.isInteger(profile.age)||profile.age<1||profile.age>120){
    return {ok:false,field:"age",msg:"年龄填 1-120 的正整数就好啦。"};
  }
  return {ok:true,field:"",msg:""};
}

function paintFieldState(){
  const p=getDraftProfile();
  const valid=checkProfile(p);

  const nameOk=Boolean(p.name);
  const ageOk=Number.isInteger(p.age)&&p.age>=1&&p.age<=120;

  E.name.classList.toggle("field-bad",!nameOk&&E.name.dataset.touched==="1");
  E.age.classList.toggle("field-bad",!ageOk&&E.age.dataset.touched==="1");

  E.nameTip.textContent=!nameOk&&E.name.dataset.touched==="1"?"名字是必填项哦。":"";
  E.ageTip.textContent=!ageOk&&E.age.dataset.touched==="1"?"请输入 1-120 的正整数年龄。":"";

  updateStepState(valid.ok);
  return valid;
}

function updateWishCount(){
  const len=Array.from(E.wish.value).length;
  E.wishCount.textContent=`${len}/80`;
  E.wishCount.classList.toggle("warn",len>=64&&len<80);
  E.wishCount.classList.toggle("max",len>=80);
}

function fillProfile(profile){
  E.name.value=profile.name||"";
  E.age.value=profile.age?String(profile.age):"";
  E.city.value=profile.city||"";
  E.hobby.value=profile.hobby||"";
  E.wish.value=profile.wish||"";
  updateWishCount();
  paintFieldState();
}

function readStoredProfile(){
  const profile=WarmCat.readJSON(WarmCat.KEYS.profile);
  if(!profile)return null;
  const checked=checkProfile({
    name:(profile.name||"").trim(),
    age:Number(profile.age),
    city:(profile.city||"").trim(),
    hobby:(profile.hobby||"").trim(),
    wish:(profile.wish||"").trim()
  });
  return checked.ok?{
    name:(profile.name||"").trim(),
    age:Number(profile.age),
    city:(profile.city||"").trim(),
    hobby:(profile.hobby||"").trim(),
    wish:(profile.wish||"").trim()
  }:null;
}

async function saveProfile(showMsg=true){
  safeAgeInput();
  E.name.dataset.touched="1";
  E.age.dataset.touched="1";

  const profile=getDraftProfile();
  const checked=checkProfile(profile);
  paintFieldState();

  if(!checked.ok){
    WarmCat.status(E.profileStatus,checked.msg,true);
    if(checked.field==="name")E.name.focus();
    if(checked.field==="age")E.age.focus();
    return false;
  }

  setBtnLoading(E.saveProfile,true);
  await wait(260);
  WarmCat.writeJSON(WarmCat.KEYS.profile,profile);
  E.saveProfile.classList.remove("btn-loading");
  E.saveProfile.disabled=false;

  if(showMsg)WarmCat.status(E.profileStatus,`已保存：${profile.name} 的资料。`);
  updateStepState(true);
  return true;
}

function loadProfile(showMsg=true){
  const profile=readStoredProfile();
  if(!profile){
    if(showMsg)WarmCat.status(E.profileStatus,"还没有已保存信息，先填一点点吧。",false);
    return false;
  }
  fillProfile(profile);
  if(showMsg)WarmCat.status(E.profileStatus,`已读取：${profile.name}（${profile.age} 岁）。`);
  return true;
}

function clearProfile(){
  [E.name,E.age,E.city,E.hobby,E.wish].forEach((el)=>{el.value="";el.dataset.touched="";el.classList.remove("field-bad");});
  E.nameTip.textContent="";
  E.ageTip.textContent="";
  updateWishCount();
  localStorage.removeItem(WarmCat.KEYS.profile);
  WarmCat.status(E.profileStatus,"信息已清空，想重新写随时都可以。",false);
  updateStepState(false);
}

function hasTodayFortune(name){
  const fortune=WarmCat.readJSON(WarmCat.KEYS.fortune);
  if(!fortune)return false;
  return fortune.date===WarmCat.day()&&fortune.name===name;
}

function updateStepState(profileReady){
  const profile=getDraftProfile();
  const ready=Boolean(profileReady)&&checkProfile(profile).ok;

  E.step2.disabled=!ready;

  E.step2.classList.toggle("done",ready);

  E.step3.disabled=!layer3Ready;

function preloadSfx(){
  Object.keys(SOUND_SRC).forEach((key)=>{
    sfxBank[key]={index:0,pool:[]};
    for(let i=0;i<3;i+=1){
      const audio=new Audio(SOUND_SRC[key]);
      audio.preload="auto";
      audio.load();
      sfxBank[key].pool.push(audio);
    }
  });
}

function playSfx(name,opt={}){
  if(!sfxBank[name])return null;
  if(musicCtrl.scaledSfx(1)<=0.001)return null;

  const entry=sfxBank[name];
  const audio=entry.pool[entry.index%entry.pool.length];
  entry.index+=1;

  audio.pause();
  audio.currentTime=0;
  audio.loop=Boolean(opt.loop);
  audio.playbackRate=Number(opt.rate)||1;
  audio.volume=Math.min(1,musicCtrl.scaledSfx(opt.ratio||0.5));

  if(audio.volume<=0.002)return null;
  if(opt.duck!==false)musicCtrl.duck(0.82,opt.loop?360:260);

  const playPromise=audio.play();
  if(playPromise&&playPromise.catch)playPromise.catch(()=>{});

  if(opt.cutMs&&!audio.loop){
    setTimeout(()=>{
      if(!audio.paused){
        audio.pause();
        audio.currentTime=0;
      }
    },opt.cutMs);
  }
  return audio;
}

function stopSfx(inst){
  if(!inst)return;
  inst.pause();
  inst.currentTime=0;
  inst.loop=false;
}

function readDailyState(){

  if(raw.date!==WarmCat.day()){

  }
  return {
    date:raw.date,
    clicks:{catA:Number(raw.clicks?.catA||0),catB:Number(raw.clicks?.catB||0),catC:Number(raw.clicks?.catC||0)},
    eggs:{catA:Boolean(raw.eggs?.catA),catB:Boolean(raw.eggs?.catB),catC:Boolean(raw.eggs?.catC)},
    usedTextIds:Array.isArray(raw.usedTextIds)?raw.usedTextIds:[]
  };
}

function readPreferenceState(){

function makeCtx(){
  const draft=getDraftProfile();
  const saved=WarmCat.readJSON(WarmCat.KEYS.profile)||{};
  const name=(draft.name||saved.name||"你").trim()||"你";
  const wish=(draft.wish||saved.wish||"今天的小愿望").trim()||"今天的小愿望";
  const age=Number(draft.age||saved.age||0);
  let call=name;
  if(Number.isInteger(age)&&age>0&&age<=14)call=`${name}小朋友`;
  if(Number.isInteger(age)&&age>=35)call=`${name}`;

  const period=WarmCat.timePeriod();
  const hintMap={
    morning:"早晨慢慢出发",
    afternoon:"午后稳稳前进",
    evening:"傍晚放轻脚步",
    night:"夜里先把自己照顾好"
  };
  return {name,wish,age,call,timeHint:hintMap[period]||"慢慢向前"};
}

function uniqueFallback(catId){
  const c=makeCtx();
  const list=[
    `${c.name}，先把呼吸放慢一点。`,
    `愿${c.wish}在温柔里实现。`,
    `${c.timeHint}，慢慢来就很好。`,
    `${c.call}，今天也在稳稳发光。`
  ];
  const serial=dailyState.usedTextIds.length+1;
  return `${list[(Date.now()+catId.length+serial)%list.length]}（贴贴${serial}）`;
}

function pickText(catId,type){
  const pool=TEXT_POOL[catId]?.[type]||[];
  if(!pool.length)return uniqueFallback(catId);

  const used=new Set(dailyState.usedTextIds);
  const available=pool.filter((item)=>!used.has(item.id));
  if(!available.length)return uniqueFallback(catId);

  const item=available[Math.floor(Math.random()*available.length)];
  dailyState.usedTextIds.push(item.id);
  saveDailyState();
  return item.text(makeCtx());
}

function triggerEgg(catId){
  if(dailyState.eggs[catId])return;
  dailyState.eggs[catId]=true;
  saveDailyState();

  const node=catButtons[catId];
  if(!node)return;

  showCatBubble(node,pickText(catId,"egg"),3600);
  for(let i=0;i<22;i+=1){
    const icon=["💗","✨","🌸","🐾","⭐"][Math.floor(Math.random()*5)];
    setTimeout(()=>spawnVfx(node,icon),i*45);
  }

  let count=0;
  const t=setInterval(()=>{
    const s=CAT_CFG[catId].sounds.click;
    playSfx(s.name,{ratio:0.58,rate:s.rate,cutMs:240});
    count+=1;
    if(count>=3)clearInterval(t);

function randomBlink(catId){

  if(!node)return;

    randomBlink(catId);

function lockCat(catId,ms){
  catRuntime[catId].lockUntil=Date.now()+ms;
}

function isCatLocked(catId){
  return Date.now()<catRuntime[catId].lockUntil;
}

function hoverCat(catId){
  if(isCatLocked(catId))return;
  const cfg=CAT_CFG[catId];
  const run=catRuntime[catId];
  const now=Date.now();
  if(now<run.hoverCooldownUntil)return;

  run.hoverCooldownUntil=now+420;
  const node=catButtons[catId];
  node.classList.add(cfg.hoverClass);
  clearTimeout(run.hoverResetTimer);
  run.hoverResetTimer=setTimeout(()=>node.classList.remove(cfg.hoverClass),320);

  const s=cfg.sounds.hover;
  playSfx(s.name,s);
}

function clickCat(catId){
  if(isCatLocked(catId))return;

  const cfg=CAT_CFG[catId];
  const node=catButtons[catId];
  lockCat(catId,560);

  node.classList.remove("cat-click");
  void node.offsetWidth;
  node.classList.add("cat-click");
  setTimeout(()=>node.classList.remove("cat-click"),340);

  const s=cfg.sounds.click;
  playSfx(s.name,s);

  spawnVfx(node,cfg.clickVfx[Math.floor(Math.random()*cfg.clickVfx.length)]);
  spawnVfx(node,cfg.clickVfx[Math.floor(Math.random()*cfg.clickVfx.length)]);

  showCatBubble(node,pickText(catId,"click"),3000);
  markInteraction(catId);

  if(dailyState.clicks[catId]===5&&!dailyState.eggs[catId])triggerEgg(catId);
}

function startLongPress(catId){
  if(isCatLocked(catId))return;

  const cfg=CAT_CFG[catId];
  const run=catRuntime[catId];
  const node=catButtons[catId];

  run.longActive=true;
  lockCat(catId,120000);
  node.classList.add("pressing");

  const s=cfg.sounds.hold;
  run.longAudio=playSfx(s.name,s);
  run.holdVfxTimer=setInterval(()=>{
    spawnVfx(node,cfg.holdVfx[Math.floor(Math.random()*cfg.holdVfx.length)]);
  },260);

  showCatBubble(node,pickText(catId,"hold"),3000);
}

function stopLongPress(catId){
  const run=catRuntime[catId];
  if(!run.longActive)return;

  run.longActive=false;
  const node=catButtons[catId];
  node.classList.remove("pressing");

  stopSfx(run.longAudio);
  run.longAudio=null;

  clearInterval(run.holdVfxTimer);
  run.holdVfxTimer=null;

  lockCat(catId,520);
}

function bindCat(catId){
  const node=catButtons[catId];
  const run=catRuntime[catId];
  const cfg=CAT_CFG[catId];

  node.addEventListener("pointerenter",(ev)=>{
    if(ev.pointerType==="mouse")hoverCat(catId);
  });

  node.addEventListener("pointerleave",()=>{
    node.classList.remove(cfg.hoverClass);
    clearTimeout(run.longPressTimer);
    if(run.longActive){
      run.skipClick=true;
      stopLongPress(catId);
    }
  });

  node.addEventListener("pointerdown",(ev)=>{
    if(ev.pointerType==="mouse"&&ev.button!==0)return;
    if(isCatLocked(catId))return;

    run.skipClick=false;
    run.pointerDown=true;

    if(ev.pointerType!=="mouse")hoverCat(catId);

    clearTimeout(run.longPressTimer);
    run.longPressTimer=setTimeout(()=>{
      startLongPress(catId);
      run.skipClick=true;
    },800);
  });

  node.addEventListener("pointerup",()=>{
    run.pointerDown=false;
    clearTimeout(run.longPressTimer);
    if(run.longActive){
      run.skipClick=true;
      stopLongPress(catId);
    }
  });

  node.addEventListener("pointercancel",()=>{
    run.pointerDown=false;
    clearTimeout(run.longPressTimer);
    if(run.longActive){
      run.skipClick=true;
      stopLongPress(catId);
    }
  });

  node.addEventListener("click",(ev)=>{
    ev.preventDefault();
    if(run.skipClick){
      run.skipClick=false;
      return;
    }
    clickCat(catId);
  });

  node.addEventListener("keydown",(ev)=>{
    if(ev.key!=="Enter"&&ev.key!==" ")return;
    ev.preventDefault();
    clickCat(catId);
  });
}

      longPressTimer:0,
      longActive:false,
      longAudio:null,
      holdVfxTimer:0,
      hoverResetTimer:0,
      pointerDown:false,
      skipClick:false
    };
    bindCat(id);
    randomBlink(id);
  });

  preloadSfx();
  initMusic();
  initFormEvents();
  initSteps();
  updateWishCount();

  const loaded=loadProfile(false);
  if(!loaded)paintFieldState();

  applyFavoriteCat();
  runDailyGreeting();

  E.saveProfile.addEventListener("click",()=>saveProfile(true));
  E.loadProfile.addEventListener("click",()=>loadProfile(true));
  E.clearProfile.addEventListener("click",clearProfile);
  E.toLayer2.addEventListener("click",goLayer2);

  WarmCat.initCuteBg(E.bgCute);
}

bootstrap();
</script>
</body>
</html>
